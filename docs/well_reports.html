<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MudGPT-DMR — Суточный рапорт</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#FFFFFF;--bg:#F5F5F7;--text:#1D1D1F;--text2:#6E6E73;--text3:#AEAEB2;
  --blue:#2563EB;--blue-l:#EFF6FF;--blue-m:#BFDBFE;
  --border:rgba(0,0,0,0.08);--sh-sm:0 1px 4px rgba(0,0,0,0.06);--sh:0 4px 20px rgba(0,0,0,0.08);
  --r:16px;--r-sm:10px;--g:#16A34A;--g-l:#F0FDF4;
}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.88);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 40px;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
.nav-mark{width:28px;height:28px;border-radius:7px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.nav-name{font-size:15px;font-weight:700;letter-spacing:-.4px}
.nav-right{display:flex;gap:10px;align-items:center}
.btn-ghost{padding:7px 16px;border-radius:var(--r-sm);border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;font-weight:500;text-decoration:none;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-ghost:hover{background:var(--bg)}
.btn-primary{padding:8px 20px;border-radius:var(--r-sm);background:var(--blue);color:#fff;font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-primary:hover{background:#1D4ED8}
.btn-green{padding:8px 20px;border-radius:var(--r-sm);background:var(--g);color:#fff;font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-green:hover{background:#15803D}

/* WRAP */
.wrap{width:min(900px,92vw);margin:0 auto;padding:40px 0 80px}

/* ── SELECTOR VIEW ────────────────────────────────── */
.sel-header{text-align:center;margin-bottom:36px}
.sel-header .eyebrow{font-size:12px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.sel-header h1{font-size:32px;font-weight:800;letter-spacing:-.8px;margin-bottom:8px}
.sel-header p{color:var(--text2);font-size:15px}

.sel-panel{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:28px 32px;box-shadow:var(--sh-sm);margin-bottom:24px}
.sel-panel h2{font-size:16px;font-weight:700;letter-spacing:-.3px;margin-bottom:18px}
.sel-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;font-weight:600;color:var(--text2)}
.fg input{border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--white);outline:none;transition:border-color .15s,box-shadow .15s}
.fg input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.sel-btn-row{display:flex;align-items:center;gap:12px;margin-top:16px}
.sel-preview{font-size:13px;color:var(--text2)}

.divider{display:flex;align-items:center;gap:12px;margin:24px 0 16px}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:12px;color:var(--text3);font-weight:500;white-space:nowrap}

/* Recent wells */
.recent-list{display:grid;gap:8px}
.recent-item{display:flex;align-items:center;justify-content:space-between;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:12px 16px;cursor:pointer;transition:border-color .15s,box-shadow .15s;box-shadow:var(--sh-sm)}
.recent-item:hover{border-color:var(--blue);box-shadow:var(--sh),0 0 0 3px rgba(37,99,235,.06)}
.recent-item-left{display:flex;align-items:center;gap:12px}
.recent-icon{width:36px;height:36px;border-radius:9px;background:var(--blue-l);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.recent-name{font-size:14px;font-weight:600}
.recent-sub{font-size:12px;color:var(--text2);margin-top:1px}
.recent-right{display:flex;align-items:center;gap:8px}
.recent-del{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;background:transparent;border:1px solid transparent;color:var(--text3);cursor:pointer;font-size:11px;font-family:inherit;transition:all .15s}
.recent-del:hover{background:#FEF2F2;border-color:#FECACA;color:#DC2626}
.recent-arrow{font-size:16px;color:var(--text3);transition:color .15s}
.recent-item:hover .recent-arrow{color:var(--blue)}

/* ── REPORTS VIEW ─────────────────────────────────── */
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text3);margin-bottom:24px}
.breadcrumb a{color:var(--text3);text-decoration:none}
.breadcrumb a:hover{color:var(--blue)}

.well-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:24px 28px;box-shadow:var(--sh-sm);margin-bottom:28px;display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap}
.well-card-left h1{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-top:8px}
.well-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--g);background:var(--g-l);border:1px solid #BBF7D0;border-radius:99px;padding:4px 12px}
.well-card-actions{display:flex;flex-direction:column;gap:10px;align-items:flex-end;flex-shrink:0}

.section-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.section-hd h2{font-size:18px;font-weight:700;letter-spacing:-.3px}
.section-hd span{font-size:13px;color:var(--text3)}

.dmr-cards{display:grid;gap:10px}
.dmr-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px;cursor:pointer;transition:all .15s;box-shadow:var(--sh-sm)}
.dmr-card:hover{border-color:var(--blue);box-shadow:var(--sh),0 0 0 3px rgba(37,99,235,.06)}
.dmr-card-left{display:flex;align-items:center;gap:12px}
.dmr-card-icon{width:38px;height:38px;border-radius:9px;background:var(--blue-l);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.dmr-card-title{font-size:15px;font-weight:700;letter-spacing:-.02em}
.dmr-card-sub{font-size:12px;color:var(--text2);margin-top:1px}
.dmr-card-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.status-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;border-radius:99px;padding:3px 10px}
.status-chip.ok{color:var(--g);background:var(--g-l);border:1px solid #BBF7D0}
.status-chip.draft{color:#D97706;background:#FFFBEB;border:1px solid #FDE68A}
.dmr-del-btn{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;background:transparent;border:1px solid transparent;color:var(--text3);cursor:pointer;font-size:11px;font-family:inherit;transition:all .15s}
.dmr-del-btn:hover{background:#FEF2F2;border-color:#FECACA;color:#DC2626}

.empty-state{text-align:center;padding:60px 24px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-sm)}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-state h3{font-size:18px;font-weight:700;letter-spacing:-.3px;margin-bottom:6px}
.empty-state p{color:var(--text2);font-size:14px;max-width:380px;margin:0 auto 24px}

@media(max-width:640px){
  nav{padding:0 20px}
  .wrap{padding:28px 0 60px}
  .sel-grid{grid-template-columns:1fr}
  .sel-panel{padding:18px}
  .well-card{padding:16px 18px}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="../index.html"><div class="nav-mark">DQ</div><span class="nav-name">DRILL-Q</span></a>
  <div class="nav-right">
    <a class="btn-ghost" href="../tools-home.html">← Инструменты</a>
  </div>
</nav>

<div class="wrap">

  <!-- ══ SELECTOR VIEW (no ?well= param) ══ -->
  <div id="selectorView">
    <div class="sel-header">
      <div class="eyebrow">MudGPT-DMR</div>
      <h1>Суточный рапорт БР</h1>
      <p>Введите данные скважины или выберите из недавних</p>
    </div>

    <div class="sel-panel">
      <h2>Выбор скважины</h2>
      <div class="sel-grid">
        <div class="fg">
          <label>Месторождение</label>
          <input type="text" id="inpField" placeholder="Самотлорское, Ванкорское…" oninput="updatePreview()">
        </div>
        <div class="fg">
          <label>Куст №</label>
          <input type="text" id="inpCluster" placeholder="1, 2А…" oninput="updatePreview()">
        </div>
        <div class="fg">
          <label>Скважина №</label>
          <input type="text" id="inpWell" placeholder="7-002, 15…" oninput="updatePreview()">
        </div>
      </div>
      <div class="sel-btn-row">
        <button class="btn-primary" onclick="goToWell()">Перейти к рапортам →</button>
        <span class="sel-preview" id="selPreview"></span>
      </div>
    </div>

    <div id="recentSection" style="display:none">
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">Недавние скважины</span>
        <div class="divider-line"></div>
      </div>
      <div class="recent-list" id="recentList"></div>
    </div>
  </div>

  <!-- ══ REPORTS VIEW (?well= param present) ══ -->
  <div id="reportsView" style="display:none">
    <div class="breadcrumb">
      <a href="../tools-home.html">DRILL-Q</a>
      <span>/</span>
      <a href="well_reports.html">Скважины DMR</a>
      <span>/</span>
      <span id="breadWell" style="color:var(--text)">—</span>
    </div>

    <div class="well-card">
      <div class="well-card-left">
        <div class="well-badge">MudGPT-DMR</div>
        <h1 id="wellTitle">—</h1>
      </div>
      <div class="well-card-actions">
        <button class="btn-green" onclick="openNewDMR()">+ Создать новый DMR</button>
        <button class="btn-ghost" onclick="window.location.href='well_reports.html'">← К выбору скважин</button>
      </div>
    </div>

    <div class="section-hd">
      <h2>Суточные рапорты</h2>
      <span id="reportsCount">0 рапортов</span>
    </div>
    <div id="reportsContainer"></div>
  </div>

</div>

<script>
const DMR_FORM_URL = 'file:///C:/Users/Andrey/Desktop/%D0%A0%D0%B0%D0%B1%D0%BE%D1%87%D0%B8%D0%B9%20%D1%81%D1%82%D0%BE%D0%BB%20%D0%BC%D0%B0%D0%B9%202026/NEW/docs/project_well_dmr_entry.html';
const WELLS_KEY = 'dmr_known_wells';
const urlParams = new URLSearchParams(window.location.search);
const wellParam = urlParams.get('well') || '';
var _recentWells = [];

function safeJson(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key) || 'null') || fallback; } catch(e) { return fallback; }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
if (wellParam) {
  document.getElementById('selectorView').style.display = 'none';
  document.getElementById('reportsView').style.display = 'block';
  initReportsView();
  saveToKnownWells(wellParam);
} else {
  renderRecentWells();
}

// ── SELECTOR VIEW ─────────────────────────────────────────────────────────────
function buildWellName() {
  var field   = (document.getElementById('inpField').value || '').trim();
  var cluster = (document.getElementById('inpCluster').value || '').trim();
  var well    = (document.getElementById('inpWell').value || '').trim();
  if (!field && !well) return '';
  var parts = [];
  if (field)   parts.push(field);
  if (cluster) parts.push('Куст ' + cluster);
  if (well)    parts.push('Скв. ' + well);
  return parts.join(' / ');
}

function updatePreview() {
  var name = buildWellName();
  document.getElementById('selPreview').textContent = name ? '→ ' + name : '';
}

function goToWell() {
  var name = buildWellName();
  if (!name) { alert('Введите название месторождения или номер скважины.'); return; }
  window.location.href = 'well_reports.html?well=' + encodeURIComponent(name);
}

['inpField','inpCluster','inpWell'].forEach(function(id){
  document.getElementById(id).addEventListener('keydown', function(e){ if (e.key === 'Enter') goToWell(); });
});

// ── KNOWN WELLS ───────────────────────────────────────────────────────────────
function saveToKnownWells(name) {
  var wells = safeJson(WELLS_KEY, []);
  wells = wells.filter(function(w){ return w !== name; });
  wells.unshift(name);
  if (wells.length > 20) wells = wells.slice(0, 20);
  localStorage.setItem(WELLS_KEY, JSON.stringify(wells));
}

function removeRecent(i) {
  _recentWells.splice(i, 1);
  localStorage.setItem(WELLS_KEY, JSON.stringify(_recentWells));
  renderRecentWells();
}

function goToRecent(i) {
  if (_recentWells[i]) window.location.href = 'well_reports.html?well=' + encodeURIComponent(_recentWells[i]);
}

function renderRecentWells() {
  _recentWells = safeJson(WELLS_KEY, []);
  var sec  = document.getElementById('recentSection');
  var list = document.getElementById('recentList');
  if (!_recentWells.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  var html = '';
  _recentWells.forEach(function(w, i){
    var count = safeJson('dmr_reports_' + w, []).length;
    html +=
      '<div class="recent-item" onclick="goToRecent(' + i + ')">' +
        '<div class="recent-item-left">' +
          '<div class="recent-icon">🛢️</div>' +
          '<div>' +
            '<div class="recent-name">' + escHtml(w) + '</div>' +
            '<div class="recent-sub">' + count + ' ' + plural(count,'рапорт','рапорта','рапортов') + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="recent-right">' +
          '<button class="recent-del" onclick="event.stopPropagation();removeRecent(' + i + ')" title="Убрать из списка">✕</button>' +
          '<span class="recent-arrow">→</span>' +
        '</div>' +
      '</div>';
  });
  list.innerHTML = html;
}

// ── REPORTS VIEW ──────────────────────────────────────────────────────────────
function initReportsView() {
  document.getElementById('breadWell').textContent = wellParam;
  document.getElementById('wellTitle').textContent = wellParam;
  renderReports();
}

function renderReports() {
  var reports = safeJson('dmr_reports_' + wellParam, []);
  var container = document.getElementById('reportsContainer');
  document.getElementById('reportsCount').textContent = reports.length + ' ' + plural(reports.length,'рапорт','рапорта','рапортов');

  if (!reports.length) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-icon">📋</div>' +
        '<h3>Рапортов пока нет</h3>' +
        '<p>Нажмите «Создать новый DMR», заполните данные и сохраните рапорт.</p>' +
        '<button class="btn-green" onclick="openNewDMR()">+ Создать первый DMR</button>' +
      '</div>';
    return;
  }

  var html = '<div class="dmr-cards">';
  reports.forEach(function(r, i){
    var no       = r.dmr_no || (i + 1);
    var dateStr  = r.date || '—';
    var depthStr = r.depth_md ? r.depth_md + ' м MD' : '—';
    var fin      = r.status === 'final';
    html +=
      '<div class="dmr-card" onclick="openReport(' + i + ')">' +
        '<div class="dmr-card-left">' +
          '<div class="dmr-card-icon">📋</div>' +
          '<div>' +
            '<div class="dmr-card-title">DMR-' + no + ' · ' + escHtml(dateStr) + '</div>' +
            '<div class="dmr-card-sub">Забой: ' + escHtml(depthStr) + ' · ' + escHtml(r.fluid_type || '—') + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="dmr-card-right">' +
          '<span class="status-chip ' + (fin ? 'ok' : 'draft') + '">' + (fin ? '✓ Финал' : '✏ Черновик') + '</span>' +
          '<button class="btn-ghost" style="font-size:12px;padding:5px 10px" onclick="event.stopPropagation();viewReport(' + i + ')">PDF</button>' +
          '<button class="dmr-del-btn" onclick="event.stopPropagation();deleteReport(' + i + ')" title="Удалить">✕</button>' +
        '</div>' +
      '</div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

function openNewDMR() {
  var reports = safeJson('dmr_reports_' + wellParam, []);
  var nextNo  = 1;
  if (reports.length > 0) {
    nextNo = Math.max.apply(null, reports.map(function(r){ return r.dmr_no || 1; })) + 1;
  }
  window.location.href = DMR_FORM_URL + '?well=' + encodeURIComponent(wellParam) + '&dmr=DMR-' + nextNo;
}

function openReport(idx) {
  var reports = safeJson('dmr_reports_' + wellParam, []);
  var r = reports[idx];
  if (!r) return;
  if (r.state_key) localStorage.setItem('ws2000_open_dmr_request', JSON.stringify({ state_key: r.state_key }));
  window.location.href = DMR_FORM_URL + '?well=' + encodeURIComponent(wellParam) + '&dmr=DMR-' + (r.dmr_no || (idx + 1));
}

function viewReport(idx) {
  var reports = safeJson('dmr_reports_' + wellParam, []);
  var r = reports[idx];
  if (!r) return;
  var html = r.html_key ? localStorage.getItem(r.html_key) : null;
  if (!html) { alert('HTML рапорт не найден. Откройте форму и нажмите «Сохранить DMR» ещё раз.'); return; }
  var w = window.open('', '_blank');
  w.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>DMR-' + (r.dmr_no||(idx+1)) + '</title>' +
    '<style>body{margin:0;padding:24px;font-family:Segoe UI,Arial,sans-serif;background:#f5f5f5}' +
    '.pb{display:flex;gap:10px;margin-bottom:16px}.pb button{padding:8px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600}' +
    '.p{background:#1b3550;color:#fff}.c{background:#e5e7eb;color:#374151}' +
    '@media print{.pb{display:none}body{padding:8px}@page{size:A4 portrait;margin:10mm}}' +
    '</style></head><body>' +
    '<div class="pb">' +
      '<button class="p" onclick="window.print()">🖨 Печать / PDF</button>' +
      '<button class="c" onclick="window.close()">Закрыть</button>' +
      '<span style="align-self:center;font-size:12px;color:#6b7280">DMR-' + (r.dmr_no||(idx+1)) + ' · ' + escHtml(wellParam) + ' · ' + (r.date||'') + '</span>' +
    '</div>' +
    html + '</body></html>');
  w.document.close();
}

function deleteReport(idx) {
  var reports = safeJson('dmr_reports_' + wellParam, []);
  var r = reports[idx];
  if (!r) return;
  if (!confirm('Удалить DMR-' + (r.dmr_no || (idx+1)) + ' от ' + r.date + '? Это действие необратимо.')) return;
  if (r.html_key)  localStorage.removeItem(r.html_key);
  if (r.state_key) localStorage.removeItem(r.state_key);
  reports.splice(idx, 1);
  localStorage.setItem('dmr_reports_' + wellParam, JSON.stringify(reports));
  renderReports();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function plural(n, f1, f2, f5) {
  var m = Math.abs(n) % 100, m1 = m % 10;
  if (m > 10 && m < 20) return f5;
  if (m1 > 1 && m1 < 5) return f2;
  if (m1 === 1) return f1;
  return f5;
}
</script>
</body>
</html>
