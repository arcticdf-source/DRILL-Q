<!doctype html>

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Программа по цементированию скважины</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Manrope:wght@400;500;600;700;800&display=swap");

    :root {
      --bg: #d7dde5;
      --paper: #ffffff;
      --ink: #17304a;
      --ink-soft: #577089;
      --line: #ced8e2;
      --head: #eaf1f8;
      --accent: #1c6aa4;
      --accent-dark: #123f67;
      --good: #0e8f69;
      --warn: #9c6519;
      --shadow: 0 18px 40px rgba(15, 34, 53, 0.14);
      --i1: #f2b84e;
      --i2: #31c6b2;
      --i3: #76a9ff;
      --i4: #b69cff;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top left, rgba(28, 106, 164, 0.08), transparent 30%), linear-gradient(180deg, #eef2f6, var(--bg));
      color: var(--ink);
      font-family: "Manrope", sans-serif;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding: 14px 22px;
      border-bottom: 1px solid rgba(23, 48, 74, 0.08);
      background: rgba(245, 248, 251, 0.92);
      backdrop-filter: blur(12px);
    }

    .toolbar-group { display: flex; flex-wrap: wrap; gap: 10px; }

    .toolbar a,
    .toolbar button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 12px;
      border: 1px solid rgba(28, 106, 164, 0.18);
      background: #fff;
      color: var(--accent-dark);
      text-decoration: none;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .toolbar .primary {
      background: linear-gradient(135deg, #dff1ff, #abd8ff);
      border-color: rgba(28, 106, 164, 0.28);
    }

    .doc-shell {
      width: min(1220px, 96vw);
      margin: 28px auto 56px;
      display: grid;
      gap: 22px;
    }

    .sheet {
      width: 100%;
      background: var(--paper);
      border: 1px solid rgba(23, 48, 74, 0.08);
      box-shadow: var(--shadow);
      padding: 26px 30px 34px;
    }

    .doc-head {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 18px;
      align-items: start;
      padding-bottom: 18px;
      border-bottom: 2px solid var(--accent-dark);
    }

    .brand { display: grid; gap: 8px; }

    .brand-mark {
      color: var(--accent);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .doc-title {
      margin: 0;
      font-family: "Merriweather", serif;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.12;
      text-transform: uppercase;
    }

    .doc-subtitle {
      margin: 0;
      color: var(--ink-soft);
      line-height: 1.65;
      font-size: 14px;
    }

    .meta-card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #f8fbfe, #eef4f9);
      padding: 14px 16px;
    }

    .meta-card table,
    .doc-table,
    .mini-table {
      width: 100%;
      border-collapse: collapse;
    }

    .meta-card td {
      padding: 6px 0;
      border-bottom: 1px solid rgba(23, 48, 74, 0.08);
      font-size: 13px;
      vertical-align: top;
    }

    .meta-card tr:last-child td { border-bottom: none; }
    .meta-card td:first-child { width: 42%; color: var(--ink-soft); }

    .section {
      margin-top: 22px;
      display: grid;
      gap: 12px;
    }

    .section-title {
      margin: 0;
      padding: 10px 12px;
      background: var(--head);
      border-left: 5px solid var(--accent);
      font-family: "Merriweather", serif;
      font-size: 20px;
    }

    .section-note,
    .card,
    .recommendation-box,
    .caption-box {
      border: 1px solid var(--line);
      background: #f9fbfd;
      padding: 12px 14px;
      color: var(--ink-soft);
      line-height: 1.65;
      font-size: 13px;
    }

    .info-grid,
    .summary-grid,
    .dual-grid,
    .visual-grid,
    .interval-grid,
    .kpi-strip {
      display: grid;
      gap: 12px;
    }

    .info-grid,
    .summary-grid,
    .dual-grid,
    .visual-grid,
    .interval-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .kpi-strip { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .info-card,
    .summary-card,
    .interval-card,
    .kpi,
    .visual-card,
    .system-card {
      border: 1px solid var(--line);
      background: #fff;
      padding: 12px 14px;
    }

    .info-card strong,
    .summary-card strong,
    .interval-card strong,
    .visual-card h3,
    .system-card h4 {
      display: block;
      margin: 0 0 6px;
      color: var(--accent-dark);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .info-card span,
    .summary-card span,
    .interval-card span,
    .system-card p,
    .visual-caption {
      color: var(--ink-soft);
      font-size: 14px;
      line-height: 1.55;
      margin: 0;
    }

    .kpi {
      background: linear-gradient(180deg, #fff, #f7fbff);
    }

    .kpi .k {
      color: var(--ink-soft);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .kpi .v {
      margin-top: 5px;
      font-size: 22px;
      font-weight: 900;
      color: var(--accent-dark);
    }

    .doc-table th,
    .doc-table td,
    .mini-table th,
    .mini-table td {
      border: 1px solid var(--line);
      padding: 8px 10px;
      vertical-align: top;
      font-size: 13px;
      line-height: 1.45;
    }

    .doc-table th,
    .mini-table th {
      background: var(--head);
      text-align: left;
      color: var(--accent-dark);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .good { color: var(--good); font-weight: 800; }
    .warn { color: var(--warn); font-weight: 800; }

    .program-block {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 2px dashed rgba(28, 106, 164, 0.18);
      display: grid;
      gap: 14px;
    }

    .program-block:first-of-type {
      margin-top: 8px;
      padding-top: 0;
      border-top: none;
    }

    .block-title {
      margin: 0;
      font-family: "Merriweather", serif;
      font-size: 22px;
      color: var(--accent-dark);
    }

    .pill-row,
    .legend-row,
    .system-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill,
    .legend-chip,
    .system-pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: #edf4fb;
      border: 1px solid rgba(28, 106, 164, 0.12);
      color: var(--accent-dark);
      font-size: 12px;
      font-weight: 700;
    }

    .legend-chip { gap: 8px; }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      flex: none;
    }

    .plain-list {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 6px;
      color: var(--ink-soft);
      font-size: 14px;
      line-height: 1.55;
    }

    .svg-shell { width: 100%; overflow: auto; }
    .svg-shell svg { width: 100%; height: auto; display: block; }

    .visual-card h3,
    .system-card h4 { margin-bottom: 8px; }

    .system-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .footer-note {
      margin-top: 8px;
      color: var(--ink-soft);
      font-size: 12px;
    }

    @media (max-width: 980px) {
      .doc-head,
      .info-grid,
      .summary-grid,
      .dual-grid,
      .visual-grid,
      .interval-grid,
      .kpi-strip,
      .system-grid { grid-template-columns: 1fr; }
      .sheet { padding: 20px 18px 28px; }
      .toolbar { padding: 12px; }
    }

    @media print {
      body { background: #fff; }
      .toolbar { display: none; }
      .doc-shell { width: 100%; margin: 0; gap: 0; }
      .sheet { box-shadow: none; border: none; padding: 0; page-break-after: always; }
      .sheet:last-child { page-break-after: auto; }
    }
  </style>

</head>

    function getParam(key, fallback) {
      const params = new URLSearchParams(window.location.search);
      return params.get(key) || fallback;
    }

    function buildLink(page, name, well, extra = {}) {
      const params = new URLSearchParams();
      if (name) params.set('name', name);
      if (well) params.set('well', well);
      Object.entries(extra).forEach(([key, value]) => params.set(key, value));
      return `${page}?${params.toString()}`;
    }

    function formatNumber(value, digits = 1, keepTrailingZeros = false) {
      if (typeof value !== 'number' || !Number.isFinite(value)) return value;
      const safeDigits = Math.max(0, digits);
      const isIntegerLike = Math.abs(value - Math.round(value)) < 0.001;
      const minimumFractionDigits = keepTrailingZeros ? safeDigits : (isIntegerLike ? 0 : safeDigits);
      return new Intl.NumberFormat('en-US', {
        minimumFractionDigits,
        maximumFractionDigits: safeDigits
      }).format(value);
    }

    function formatMoney(value) {
      return formatNumber(value, 2, true);
    }

    function createSvg(width, height, inner) {
      return `<svg viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
    }

    function normalizeChemicalName(name) {
      return name.replace(/\s*\([^)]*\)$/u, '').trim();

    function getStageTotalVolume(stage) {
      return stage.systems.reduce((sum, system) => sum + (Number(system.volume) || 0), 0);
    }

    function aggregateMaterials() {
      const map = new Map();
      stages.forEach((stage) => {
        stage.materials.forEach(([name, purpose, unit, qty]) => {
          const key = `${normalizeChemicalName(name)}__${unit}`;
          if (!map.has(key)) {
            map.set(key, { name: normalizeChemicalName(name), purpose, unit, qty: 0, stages: [] });
          }
          const entry = map.get(key);
          entry.qty += qty;
          entry.stages.push(stage.title);
        });
      });
      return Array.from(map.values()).sort((a, b) => a.name.localeCompare(b.name, 'ru'));
    }

    function getMaterialPrice(item) {
      const key = `${item.name}__${item.unit}`;
      const roughKey = Object.keys(priceHints).find((hint) => key.startsWith(hint.replace(/__.*$/, '')) && key.endsWith(hint.replace(/^.*__/, '')));
      const price = priceHints[key] || priceHints[roughKey] || 0;
      const factor = item.unit === 'кг' ? 1 / 1000 : 1;
      return {
        price,
        total: item.qty * factor * price
      };
    }

    function createVolumeChart() {
      const width = 940;
      const height = 360;
      const margin = { top: 24, right: 24, bottom: 56, left: 80 };
      const items = stages.map((stage) => ({
        title: stage.title,
        color: stage.color,
        buffer: stage.systems[0]?.volume || 0,
        light: stage.systems[1]?.volume || 0,
        heavy: stage.systems[2]?.volume || 0,
        displacement: stage.systems[3]?.volume || 0
      }));
      const plotWidth = width - margin.left - margin.right;
      const plotHeight = height - margin.top - margin.bottom;
      const maxValue = Math.max(...items.map((item) => item.buffer + item.light + item.heavy + item.displacement), 1);
      const bandWidth = plotWidth / items.length - 24;
      const grid = Array.from({ length: 6 }, (_, index) => {
        const value = (maxValue / 5) * index;
        const y = margin.top + plotHeight - (plotHeight / 5) * index;
        return `<line x1="${margin.left}" y1="${y}" x2="${width - margin.right}" y2="${y}" stroke="rgba(23,48,74,0.08)" /><text x="${margin.left - 12}" y="${y + 4}" font-size="11" fill="#7a8ea2" text-anchor="end">${formatNumber(value, 0)}</text>`;
      }).join('');
      const bars = items.map((item, index) => {
        const x = margin.left + index * (plotWidth / items.length) + 12;
        const parts = [
          { value: item.displacement, color: 'rgba(18,63,103,0.18)' },
          { value: item.heavy, color: '#ffbf66' },
          { value: item.light, color: '#21d5b0' },
          { value: item.buffer, color: item.color }
        ];
        let bottom = height - margin.bottom;
        const segments = parts.map((part) => {
          const h = (part.value / maxValue) * plotHeight;
          bottom -= h;
          return `<rect x="${x}" y="${bottom}" width="${bandWidth}" height="${h}" rx="8" fill="${part.color}" />`;
        }).join('');
        const total = item.buffer + item.light + item.heavy + item.displacement;
        const totalY = margin.top + plotHeight - (total / maxValue) * plotHeight;
        return `${segments}<text x="${x + bandWidth / 2}" y="${totalY - 8}" font-size="11" fill="#17304a" text-anchor="middle">${formatNumber(total, 2)}</text><text x="${x + bandWidth / 2}" y="${height - margin.bottom + 18}" font-size="11" fill="#6e8397" text-anchor="middle">${item.title}</text>`;
      }).join('');
      return createSvg(width, height, `${grid}<line x1="${margin.left}" y1="${height - margin.bottom}" x2="${width - margin.right}" y2="${height - margin.bottom}" stroke="#8db4ff" stroke-width="1.5" />${bars}`);
    }

    function renderPressureChart(stage) {
      const width = 820;
      const height = 320;
      const margin = { top: 20, right: 24, bottom: 42, left: 72 };
      const maxPressure = Math.max(...stage.pressureProfile.flatMap((point) => [point.outer, point.inner, point.collapseLimit, point.burstLimit]));
      const maxDepth = Math.max(...stage.pressureProfile.map((point) => point.depth));
      const scaleX = (value) => margin.left + (value / maxPressure) * (width - margin.left - margin.right);
      const scaleY = (value) => margin.top + (value / maxDepth) * (height - margin.top - margin.bottom);
      const grid = Array.from({ length: 6 }, (_, index) => {
        const pressure = (maxPressure / 5) * index;
        const x = scaleX(pressure);
        return `<line x1="${x}" y1="${margin.top}" x2="${x}" y2="${height - margin.bottom}" stroke="rgba(23,48,74,0.08)" /><text x="${x}" y="${height - 10}" font-size="11" fill="#7a8ea2" text-anchor="middle">${formatNumber(pressure, 1)}</text>`;
      }).join('');
      const makePath = (key) => stage.pressureProfile.map((point, index) => `${index === 0 ? 'M' : 'L'} ${scaleX(point[key])} ${scaleY(point.depth)}`).join(' ');
      const depthMarks = stage.pressureProfile.map((point) => `<line x1="${margin.left}" y1="${scaleY(point.depth)}" x2="${width - margin.right}" y2="${scaleY(point.depth)}" stroke="rgba(23,48,74,0.05)" /><text x="${margin.left - 10}" y="${scaleY(point.depth) + 4}" font-size="11" fill="#7a8ea2" text-anchor="end">${formatNumber(point.depth, point.depth % 1 ? 1 : 0)}</text>`).join('');
      return createSvg(width, height, `${grid}${depthMarks}<line x1="${margin.left}" y1="${margin.top}" x2="${margin.left}" y2="${height - margin.bottom}" stroke="#8db4ff" stroke-width="1.2" /><line x1="${margin.left}" y1="${height - margin.bottom}" x2="${width - margin.right}" y2="${height - margin.bottom}" stroke="#8db4ff" stroke-width="1.2" /><path d="${makePath('outer')}" fill="none" stroke="#0e8f69" stroke-width="3" /><path d="${makePath('inner')}" fill="none" stroke="#e45656" stroke-width="3" /><path d="${makePath('collapseLimit')}" fill="none" stroke="#7abef0" stroke-width="2" stroke-dasharray="8 6" /><path d="${makePath('burstLimit')}" fill="none" stroke="#dca03e" stroke-width="2" stroke-dasharray="8 6" />`);
    }

    const totalFluidVolume = stages.reduce((sum, stage) => sum + getStageTotalVolume(stage), 0);
    const totalCementMass = materialTotals.filter((item) => /цемент/i.test(item.name)).reduce((sum, item) => sum + item.qty, 0);
    const maxPressure = Math.max(...stages.map((stage) => Number(stage.testPressure.replace(',', '.').match(/[\d.]+/)?.[0] || 0)));
    const docShell = document.getElementById('docShell');

    docShell.innerHTML = `
      <section class="sheet">
        <div class="doc-head">
          <div class="brand">

            <h1 class="doc-title">Программа по цементированию скважины</h1>
            <p class="doc-subtitle">Автосформированный документ по всем интервалам крепления: архитектура колонн, составы буферных и тампонажных систем, контрольные давления, оснастка и укрупненный материальный баланс.</p>

            <table>
              <tr><td>Месторождение</td><td>${projectName}</td></tr>

              <tr><td>Статус</td><td>Черновик программы / автосборка</td></tr>

          <div class="kpi"><div class="k">Суммарный цемент</div><div class="v">${formatNumber(totalCementMass, 1)} т</div></div>
          <div class="kpi"><div class="k">Макс. давление</div><div class="v">${formatNumber(maxPressure, 1)} МПа</div></div>
        </div>

        <div class="section">
          <h2 class="section-title">1. Общие положения</h2>
          <div class="info-grid">
            ${generalInfo.map((item, index) => `<div class="info-card"><strong>${index + 1}. Позиция</strong><span>${item}</span></div>`).join('')}
          </div>
          <div class="recommendation-box">Документ собран по данным текущего модуля крепления и предназначен как рабочая инженерная программа. При наличии исходного образца оформления можно дополнительно привести структуру и формулировки к требуемому корпоративному шаблону.</div>
        </div>

        <div class="section">
          <h2 class="section-title">2. Критерии качества и последовательность работ</h2>
          <div class="dual-grid">
            <div class="card"><strong>Критерии качества цементирования</strong><ul class="plain-list">${controlCriteria.map((item) => `<li>${item}</li>`).join('')}</ul></div>
            <div class="card"><strong>Базовая последовательность операции</strong><ol class="plain-list">${executionSequence.map((item) => `<li>${item}</li>`).join('')}</ol></div>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">3. Архитектура крепления и графика</h2>
          <div class="legend-row">
            ${stages.map((stage) => `<span class="legend-chip"><span class="legend-dot" style="background:${stage.color}"></span>${stage.title} · ${stage.casing}</span>`).join('')}
          </div>
          <div class="visual-grid">
            <div class="visual-card">
              <h3>Схема крепления</h3>
              <div class="svg-shell">${createCementingSchematic()}</div>
              <div class="visual-caption">Цветная заливка показывает зоны подъема цемента. Для хвостовика отражен отдельный блок подвески и испытания, без цементирования затрубного пространства.</div>
            </div>
            <div class="visual-card">
              <h3>Структура объемов</h3>
              <div class="svg-shell">${createVolumeChart()}</div>
              <div class="visual-caption">Стековая диаграмма показывает объем буфера, облегченного цементного раствора, хвостовой порции и продавочной жидкости для каждого интервала.</div>
            </div>

              ${materialTotals.map((item) => {

                return `<tr><td>${item.name}</td><td>${item.purpose}</td><td>${item.unit}</td><td>${formatNumber(item.qty, item.unit === 'кг' ? 0 : 2)}</td><td>${Array.from(new Set(item.stages)).join(', ')}</td><td>${pricing.price ? `${formatMoney(pricing.price)} руб.` : '—'}</td><td>${pricing.total ? `${formatMoney(pricing.total)} руб.` : '—'}</td></tr>`;

        </div>
      </section>`;
  </script>
  <script src="assets/js/global-auth-widget.js"></script>
</body>
</html>
