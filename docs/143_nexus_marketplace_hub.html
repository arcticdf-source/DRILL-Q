<head>

  <title>143 · Nexus Marketplace Hub</title>
  <style>

<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>143 · Nexus Marketplace Hub</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Condensed:wght@500;600;700&display=swap");

    :root {
      --bg: #eef2f5;
      --panel: rgba(255, 255, 255, 0.96);
      --surface: #f8fbfd;
      --line: rgba(16, 43, 66, 0.12);
      --text: #132b41;
      --muted: #66788a;
      --gold: #b9781e;
      --mint: #0c7a79;
      --cyan: #2a6ea7;
      --shadow: 0 24px 56px rgba(20, 42, 68, 0.1);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "IBM Plex Sans", sans-serif;
      background:
        radial-gradient(820px 420px at 0% 0%, rgba(12, 122, 121, 0.08), transparent 70%),
        radial-gradient(720px 420px at 100% 0%, rgba(185, 120, 30, 0.1), transparent 72%),
        linear-gradient(180deg, #f7fafc 0%, #eef2f5 52%, #e8edf2 100%);
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(to right, rgba(19, 43, 65, 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(19, 43, 65, 0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      opacity: 0.45;
    }

    a { color: inherit; }

    .page {
      position: relative;
      z-index: 1;
      width: min(1460px, calc(100% - 34px));
      margin: 0 auto;
      padding: 20px 0 42px;
    }

    .topbar,
    .hero,
    .panel,
    .sidebar,
    .workspace,
    .supplier-card,
    .rfq-card,
    .route-card,
    .product-row {
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      margin-bottom: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .brand-mark {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ebaf54 0%, #d1811d 100%);
      box-shadow: 0 0 0 6px rgba(209, 129, 29, 0.12);
    }

    .top-actions,
    .toggle-row,
    .hero-actions,
    .search-actions,
    .category-rail,
    .rail-line,
    .row-actions,
    .panel-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .button,
    .button-secondary,
    .toggle,
    .chip,
    .row-button,
    .tiny-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid rgba(19, 43, 65, 0.12);
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
    }

    .button,
    .row-button.primary {
      color: #ffffff;
      background: linear-gradient(135deg, #d28a28 0%, #b76d14 100%);
      border-color: rgba(183, 109, 20, 0.46);
    }

    .toggle.active,
    .chip.active {
      background: rgba(12, 122, 121, 0.1);
      border-color: rgba(12, 122, 121, 0.3);
      color: var(--mint);
    }

    .tiny-button {
      min-height: 34px;
      padding: 0 12px;
      font-size: 11px;
    }

    .hero {
      padding: 26px;
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(300px, 0.6fr);
      gap: 18px;
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -80px;
      top: -40px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(42, 110, 167, 0.12), transparent 72%);
      pointer-events: none;
    }

    .eyebrow,
    .tag,
    .badge,
    .row-tag,
    .filter-label,
    .supplier-badge,
    .rfq-badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .eyebrow,
    .tag,
    .row-tag,
    .filter-label {
      background: rgba(12, 122, 121, 0.1);
      color: var(--mint);
    }

    .badge,
    .supplier-badge {
      background: rgba(42, 110, 167, 0.1);
      color: var(--cyan);
    }

    .rfq-badge.hot {
      background: rgba(185, 120, 30, 0.14);
      color: var(--gold);
    }

    h1,
    h2,
    h3,
    h4 {
      margin: 0;
      font-family: "IBM Plex Sans Condensed", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    h1 {
      margin-top: 14px;
      font-size: clamp(38px, 4.6vw, 68px);
      line-height: 0.94;
      max-width: 840px;
    }

    .hero-copy,
    .panel-copy,
    .filter-copy,
    .supplier-copy,
    .rfq-copy,
    .row-subcopy,
    .status-copy,
    .cart-copy,
    .route-copy,
    .metric-copy {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .hero-copy {
      margin-top: 16px;
      max-width: 760px;
    }

    .hero-grid,
    .hero-metrics,
    .filter-stack,
    .filter-list,
    .product-list,
    .supplier-grid,
    .rfq-grid,
    .route-grid,
    .cart-list,
    .status-list {
      display: grid;
      gap: 12px;
    }

    .hero-metrics {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 22px;
    }

    .metric-tile {
      padding: 16px;
      border-radius: 22px;
      background: var(--surface);
      border: 1px solid rgba(19, 43, 65, 0.08);
    }

    .metric-value {
      margin-top: 8px;
      font-family: "IBM Plex Sans Condensed", sans-serif;
      font-size: 32px;
      line-height: 1;
    }

    .workspace {
      padding: 18px;
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 320px;
      gap: 16px;
      align-items: start;
    }

    .sidebar,
    .panel {
      padding: 18px;
      background: var(--surface);
    }

    .panel {
      margin-bottom: 16px;
    }

    .panel:last-child {
      margin-bottom: 0;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .search-box {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      padding: 14px;
      border-radius: 24px;
      background: linear-gradient(135deg, #f9fbfd 0%, #eef5fb 100%);
      border: 1px solid rgba(19, 43, 65, 0.1);
    }

    .search-main {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 58px;
      padding: 0 16px;
      border-radius: 18px;
      border: 1px solid rgba(19, 43, 65, 0.08);
      background: #ffffff;
    }

    .search-icon {
      color: var(--mint);
      font-size: 18px;
      font-weight: 700;
    }

    .search-placeholder {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .category-rail {
      margin-top: 14px;
      overflow-x: auto;
      padding-bottom: 2px;
      flex-wrap: nowrap;
    }

    .chip {
      min-height: 36px;
      white-space: nowrap;
      padding: 0 14px;
      background: rgba(255, 255, 255, 0.9);
    }

    .filter-group {
      padding: 14px;
      border-radius: 20px;
      background: #ffffff;
      border: 1px solid rgba(19, 43, 65, 0.08);
    }

    .filter-copy { margin-top: 8px; }

    .filter-list {
      margin-top: 10px;
    }

    .filter-item,
    .cart-item,
    .status-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .filter-item strong,
    .cart-item strong,
    .status-item strong {
      color: var(--text);
    }

    .product-row {
      padding: 16px 18px;
      background: #ffffff;
    }

    .row-top,
    .row-grid,
    .cart-head,
    .route-head,
    .supplier-top,
    .rfq-top {
      display: grid;
      gap: 12px;
      align-items: center;
    }

    .row-top {
      grid-template-columns: minmax(0, 1.4fr) 140px 130px 140px 130px 120px;
      margin-bottom: 12px;
    }

    .row-grid {
      grid-template-columns: minmax(0, 1.4fr) 140px 130px 140px 130px 120px;
    }

    .row-header {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .row-title {
      font-family: "IBM Plex Sans Condensed", sans-serif;
      font-size: 28px;
      line-height: 1;
      text-transform: uppercase;
    }

    .row-subcopy {
      margin-top: 8px;
      max-width: 560px;
    }

    .row-meta {
      display: grid;
      gap: 4px;
    }

    .row-meta strong {
      color: var(--text);
      font-size: 14px;
    }

    .row-meta span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .row-actions {
      margin-top: 14px;
    }

    .cart-head {
      grid-template-columns: minmax(0, 1fr) auto;
      margin-bottom: 12px;
    }

    .cart-total {
      font-family: "IBM Plex Sans Condensed", sans-serif;
      font-size: 36px;
      line-height: 1;
      color: var(--gold);
    }

    .status-list,
    .cart-list {
      margin-top: 12px;
    }

    .status-item,
    .cart-item {
      padding: 10px 0;
      border-bottom: 1px solid rgba(19, 43, 65, 0.08);
    }

    .status-item:last-child,
    .cart-item:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .supplier-grid,
    .rfq-grid,
    .route-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .supplier-card,
    .rfq-card,
    .route-card {
      padding: 18px;
      background: var(--surface);
    }

    .supplier-name,
    .rfq-title,
    .route-title {
      margin-top: 10px;
      font-family: "IBM Plex Sans Condensed", sans-serif;
      font-size: 24px;
      line-height: 1;
      text-transform: uppercase;
    }

    .supplier-value,
    .rfq-value {
      font-family: "IBM Plex Sans Condensed", sans-serif;
      font-size: 30px;
      line-height: 1;
      color: var(--gold);
    }

    .rail-line {
      margin-top: 12px;
    }

    .rail-chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(19, 43, 65, 0.06);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .route-card {
      text-decoration: none;
      color: inherit;
    }

    .route-card.current {
      border-color: rgba(12, 122, 121, 0.32);
      background: linear-gradient(135deg, rgba(12, 122, 121, 0.08), rgba(255, 255, 255, 0.96));
    }

    @media (max-width: 1240px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .supplier-grid,
      .rfq-grid,
      .route-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 1040px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .row-top,
      .row-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 20px, 1460px);
      }

      .supplier-grid,
      .rfq-grid,
      .route-grid,
      .hero-metrics,
      .row-top,
      .row-grid,
      .search-box {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
  <script src="../nav-inject.js"></script>
</head>
<body>
  <main class="page">
    <section class="topbar" aria-label="Верхняя навигация Nexus Marketplace">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span id="brandLabel">Nexus Oilfield Market</span>
      </div>
      <div class="top-actions">
        <a class="button-secondary" href="../index.html" id="nexusCta">Nexus</a>
        <a class="button-secondary" href="142_nexus_marketplace_build_tracker.html" id="towerCta">Control Tower</a>
      </div>
    </section>

    <section class="hero">
      <article>
        <span class="eyebrow" id="heroEyebrow"></span>
        <h1 id="heroTitle"></h1>
        <p class="hero-copy" id="heroCopy"></p>
        <div class="hero-actions" style="margin-top: 22px;">
          <a class="button" href="144_nexus_catalog_workbench.html" id="catalogCta"></a>
          <a class="button-secondary" href="146_nexus_rfq_command.html" id="rfqCta"></a>
        </div>
        <div class="hero-metrics" id="heroMetrics"></div>
      </article>

      <aside class="hero-grid">
        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="tag" id="controlTag"></div>
              <h2 id="controlTitle"></h2>
              <p class="panel-copy" id="controlCopy"></p>
            </div>
          </div>
          <div class="toggle-row" id="langToggleRow">
            <button class="toggle active" type="button" data-lang="ru">RU</button>
            <button class="toggle" type="button" data-lang="en">EN</button>
          </div>
          <div class="toggle-row" id="unitToggleRow" style="margin-top: 10px;">
            <button class="toggle active" type="button" data-unit="si">SI</button>
            <button class="toggle" type="button" data-unit="field">Field</button>
          </div>
          <div class="status-list" id="statusList"></div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="tag" id="promiseTag"></div>
              <h2 id="promiseTitle"></h2>
            </div>
            <div class="badge" id="promiseBadge"></div>
          </div>
          <div class="status-list" id="promiseList"></div>
        </div>
      </aside>
    </section>

    <section class="workspace">
      <aside class="sidebar">
        <div class="panel-head">
          <div>
            <div class="tag" id="filterTag"></div>
            <h2 id="filterTitle"></h2>
            <p class="filter-copy" id="filterCopy"></p>
          </div>
        </div>
        <div class="filter-stack" id="filterStack"></div>
      </aside>

      <section>
        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="tag" id="searchTag"></div>
              <h2 id="searchTitle"></h2>
              <p class="panel-copy" id="searchCopy"></p>
            </div>
            <div class="panel-actions" id="searchActions"></div>
          </div>
          <div class="search-box">
            <div class="search-main">
              <div class="search-icon">⌕</div>
              <div class="search-placeholder" id="searchPlaceholder"></div>
            </div>
            <div class="search-actions" id="heroSearchActions"></div>
          </div>
          <div class="category-rail" id="categoryRail"></div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="tag" id="resultsTag"></div>
              <h2 id="resultsTitle"></h2>
              <p class="panel-copy" id="resultsCopy"></p>
            </div>
            <div class="badge" id="resultsBadge"></div>
          </div>
          <div class="row-top" id="rowTop"></div>
          <div class="product-list" id="productList"></div>
        </div>
      </section>

      <aside class="sidebar">
        <div class="panel-head">
          <div>
            <div class="tag" id="cartTag"></div>
            <h2 id="cartTitle"></h2>
            <p class="cart-copy" id="cartCopy"></p>
          </div>
        </div>
        <div class="cart-head">
          <div>
            <div class="filter-label" id="cartValueLabel"></div>
            <div class="cart-total" id="cartTotal"></div>
          </div>
          <a class="button" href="146_nexus_rfq_command.html" id="cartCta"></a>
        </div>
        <div class="cart-list" id="cartList"></div>
      </aside>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <div class="tag" id="supplierTag"></div>
          <h2 id="supplierTitle"></h2>
          <p class="panel-copy" id="supplierCopy"></p>
        </div>
      </div>
      <div class="supplier-grid" id="supplierGrid"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <div class="tag" id="rfqTag"></div>
          <h2 id="rfqTitle"></h2>
          <p class="panel-copy" id="rfqCopy"></p>
        </div>
      </div>
      <div class="rfq-grid" id="rfqGrid"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <div class="tag" id="routesTag"></div>
          <h2 id="routesTitle"></h2>
          <p class="panel-copy" id="routesCopy"></p>
        </div>
      </div>
      <div class="route-grid" id="routeGrid"></div>
    </section>
  </main>
  <script src="assets/js/global-auth-widget.js"></script>

        storedContext = {};

        lang: storedContext.lang === 'en' ? 'en' : 'ru',

          ],
          filterTag: 'Market filters',
          filterTitle: 'Фильтры Покупателя',
