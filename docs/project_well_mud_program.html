<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Программа по буровым растворам</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Manrope:wght@400;500;600;700;800&display=swap");

    :root {
      --bg: #d8dde5;
      --ink: #17304a;
      --ink-soft: #4f6478;
      --line: #ccd5df;
      --line-strong: #9dafc1;
      --paper: #ffffff;
      --head: #eaf0f7;
      --accent: #1c6aa4;
      --accent-dark: #0f446c;
      --ok: #0c8a68;
      --warn: #a66c1c;
      --shadow: 0 18px 40px rgba(16, 33, 51, 0.14);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top left, rgba(28, 106, 164, 0.08), transparent 28%), linear-gradient(180deg, #eef2f6, var(--bg));
      color: var(--ink);
      font-family: "Manrope", sans-serif;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 22px;
      border-bottom: 1px solid rgba(23, 48, 74, 0.08);
      background: rgba(245, 248, 251, 0.92);
      backdrop-filter: blur(12px);
    }

    .toolbar-group { display: flex; flex-wrap: wrap; gap: 10px; }

    .toolbar a,
    .toolbar button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 12px;
      border: 1px solid rgba(28, 106, 164, 0.18);
      background: #fff;
      color: var(--accent-dark);
      text-decoration: none;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .toolbar .primary {
      background: linear-gradient(135deg, #e2f2ff, #a9d8ff);
      border-color: rgba(28, 106, 164, 0.28);
    }

    .doc-shell {
      width: min(1200px, 96vw);
      margin: 28px auto 56px;
      display: grid;
      gap: 22px;
    }

    .sheet {
      width: 100%;
      background: var(--paper);
      border: 1px solid rgba(23, 48, 74, 0.08);
      box-shadow: var(--shadow);
      padding: 26px 30px 34px;
    }

    .doc-head {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 18px;
      align-items: start;
      border-bottom: 2px solid var(--accent-dark);
      padding-bottom: 18px;
    }

    .brand {
      display: grid;
      gap: 8px;
    }

    .brand-mark {
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .doc-title {
      margin: 0;
      font-family: "Merriweather", serif;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.12;
      text-transform: uppercase;
    }

    .doc-subtitle {
      margin: 0;
      color: var(--ink-soft);
      line-height: 1.65;
      font-size: 14px;
    }

    .meta-card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #f8fbfe, #eef4f9);
      padding: 14px 16px;
    }

    .meta-card table,
    .doc-table,
    .mini-table {
      width: 100%;
      border-collapse: collapse;
    }

    .meta-card td {
      padding: 6px 0;
      border-bottom: 1px solid rgba(23, 48, 74, 0.08);
      font-size: 13px;
      vertical-align: top;
    }

    .meta-card tr:last-child td { border-bottom: none; }
    .meta-card td:first-child { width: 42%; color: var(--ink-soft); }

    .section {
      margin-top: 22px;
      display: grid;
      gap: 12px;
    }

    .section-title {
      margin: 0;
      padding: 10px 12px;
      background: var(--head);
      border-left: 5px solid var(--accent);
      font-family: "Merriweather", serif;
      font-size: 20px;
    }

    .section-note,
    .recommendation-box,
    .interval-note {
      border: 1px solid var(--line);
      background: #f9fbfd;
      padding: 12px 14px;
      line-height: 1.65;
      color: var(--ink-soft);
      font-size: 13px;
    }

    .info-grid,
    .summary-grid,
    .interval-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .info-card,
    .summary-card,
    .interval-card {
      border: 1px solid var(--line);
      padding: 12px 14px;
      background: #fff;
    }

    .info-card strong,
    .summary-card strong,
    .interval-card strong {
      display: block;
      margin-bottom: 6px;
      color: var(--accent-dark);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .info-card span,
    .summary-card span,
    .interval-card span {
      color: var(--ink-soft);
      font-size: 14px;
      line-height: 1.55;
    }

    .doc-table th,
    .doc-table td,
    .mini-table th,
    .mini-table td {
      border: 1px solid var(--line);
      padding: 8px 10px;
      vertical-align: top;
      font-size: 13px;
      line-height: 1.45;
    }

    .doc-table th,
    .mini-table th {
      background: var(--head);
      text-align: left;
      color: var(--accent-dark);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .kpi {
      border: 1px solid var(--line);
      padding: 12px 14px;
      background: linear-gradient(180deg, #fff, #f7fbff);
    }

    .kpi .k {
      color: var(--ink-soft);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .kpi .v {
      margin-top: 5px;
      font-size: 20px;
      font-weight: 900;
      color: var(--accent-dark);
    }

    .program-block {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 2px dashed rgba(28, 106, 164, 0.18);
      display: grid;
      gap: 14px;
    }

    .program-block:first-of-type {
      margin-top: 8px;
      padding-top: 0;
      border-top: none;
    }

    .block-title {
      margin: 0;
      font-family: "Merriweather", serif;
      font-size: 22px;
      color: var(--accent-dark);
    }

    .pill-row { display: flex; flex-wrap: wrap; gap: 8px; }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: #edf4fb;
      border: 1px solid rgba(28, 106, 164, 0.12);
      color: var(--accent-dark);
      font-size: 12px;
      font-weight: 700;
    }

    .risk-list,
    .plain-list {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 6px;
      color: var(--ink-soft);
      font-size: 14px;
      line-height: 1.55;
    }

    .stage-table-caption {
      margin: 0;
      color: var(--ink-soft);
      font-size: 12px;
      line-height: 1.55;
    }

    .recommendation-box {
      background: linear-gradient(180deg, #fbfdff, #f1f7fc);
      color: var(--ink);
    }

    .recommendation-box strong { color: var(--accent-dark); }
    .footer-note { margin-top: 8px; color: var(--ink-soft); font-size: 12px; }
    .visual-grid,
    .dual-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .single-visual { display: grid; gap: 12px; }
    .visual-card {
      border: 1px solid var(--line);
      background: #fff;
      padding: 12px 14px;
      display: grid;
      gap: 10px;
    }
    .visual-card h3 {
      margin: 0;
      color: var(--accent-dark);
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .visual-caption {
      color: var(--ink-soft);
      font-size: 12px;
      line-height: 1.55;
    }
    .svg-shell { width: 100%; overflow: auto; }
    .svg-shell svg { width: 100%; height: auto; display: block; }
    .strat-column {
      display: grid;
      gap: 8px;
      max-height: 1120px;
      overflow: auto;
      padding-right: 6px;
      background: linear-gradient(180deg, #fbfdff, #f4f8fc);
      border: 1px solid var(--line);
      padding: 10px;
    }
    .layer {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 8px;
      border: 1px solid var(--line);
      background: #fff;
      overflow: hidden;
    }
    .layer-depth {
      padding: 10px 8px;
      background: #f3f7fb;
      border-right: 1px solid var(--line);
      font-size: 12px;
      line-height: 1.35;
      color: var(--ink-soft);
    }
    .layer-body { padding: 10px 12px; border-left: 6px solid transparent; }
    .layer-body h4 { margin: 0 0 4px; font-size: 14px; color: var(--accent-dark); }
    .layer-body p { margin: 0; color: var(--ink-soft); font-size: 12px; line-height: 1.5; }
    .layer-meta { margin-top: 7px; display: flex; flex-wrap: wrap; gap: 6px; }
    .geo-pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #f5f8fb;
      color: var(--ink-soft);
      font-size: 11px;
    }
    .l-sand .layer-body { border-left-color: #8db4ff; }
    .l-clay .layer-body { border-left-color: #c6a6ff; }
    .l-prod .layer-body { border-left-color: #74f0ff; }
    .l-risk .layer-body { border-left-color: #ff8f8f; }
    .l-mix .layer-body { border-left-color: #ffd089; }

    @media (max-width: 980px) {
      .doc-head,
      .info-grid,
      .summary-grid,
      .interval-grid,
      .kpi-strip,
      .visual-grid,
      .dual-grid { grid-template-columns: 1fr; }
      .sheet { padding: 20px 18px 28px; }
      .toolbar { padding: 12px; }
    }

    @media print {
      body { background: #fff; }
      .toolbar { display: none; }
      .doc-shell { width: 100%; margin: 0; gap: 0; }
      .sheet { box-shadow: none; border: none; padding: 0; page-break-after: always; }
      .sheet:last-child { page-break-after: auto; }
    }
  </style>
  <script src="../nav-inject.js"></script>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-group">
      <a id="backLink" href="#">Назад к разделу буровых растворов</a>
      <a id="dashboardLink" href="#">К скважине</a>
    </div>
    <div class="toolbar-group">
      <button class="primary" type="button" onclick="window.print()">Печать / PDF</button>
    </div>
  </div>

  <main class="doc-shell" id="docShell"></main>

  <script>
    function getParam(key, fallback) {
      const params = new URLSearchParams(window.location.search);
      return params.get(key) || fallback;
    }

    function buildLink(page, name, well, extra = {}) {
      const params = new URLSearchParams();
      if (name) params.set('name', name);
      if (well) params.set('well', well);
      Object.entries(extra).forEach(([key, value]) => params.set(key, value));
      return `${page}?${params.toString()}`;
    }

    function formatNumber(value, digits = 1, keepTrailingZeros = false) {
      if (typeof value !== 'number' || !Number.isFinite(value)) return value;
      const safeDigits = Math.max(0, digits);
      const isIntegerLike = Math.abs(value - Math.round(value)) < 0.001;
      const minimumFractionDigits = keepTrailingZeros ? safeDigits : (isIntegerLike ? 0 : safeDigits);
      return new Intl.NumberFormat('en-US', {
        minimumFractionDigits,
        maximumFractionDigits: safeDigits
      }).format(value);
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function readStoredMap(key) {
      const raw = localStorage.getItem(key);
      if (!raw) return {};
      try {
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === 'object' ? parsed : {};
      } catch (error) {
        console.warn(`Failed to parse localStorage payload for ${key}`, error);
        return {};
      }
    }

    function createSvg(width, height, inner) {
      return `<svg viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
    }

    const projectName = getParam('name', 'Проект');
    const wellName = getParam('well', '9301');
    const today = new Date().toLocaleDateString('ru-RU');
    const recommendationStorageKey = `nexus-mud-recommendations-${projectName}-${wellName}`;
    const normStorageKey = `nexus-mud-norms-${projectName}-${wellName}`;
    const savedRecommendations = readStoredMap(recommendationStorageKey);
    const savedNorms = readStoredMap(normStorageKey);

    document.title = `${projectName} · Скважина ${wellName} · Программа по буровым растворам`;
    document.getElementById('backLink').href = buildLink('project_well_section.html', projectName, wellName, { section: 'Буровые растворы', number: '5' });
    document.getElementById('dashboardLink').href = buildLink('project_well_dashboard.html', projectName, wellName);

    const pressureTemp = [
      { top: 0, bottom: 350, label: 'Q-P2', mining: 0.0152, temp: 2.4 },
      { top: 450, bottom: 700, label: 'P1', mining: 0.0177, temp: 10.5 },
      { top: 960, bottom: 1210, label: 'K2k+kt+tm', mining: 0.0192, temp: 27.2 },

    function getNorm(stageId, reagentIndex, fallback) {
      const value = Number(savedNorms[`${stageId}::${reagentIndex}`]);
      return Number.isFinite(value) ? value : fallback;
    }

    function formatQty(value, unit) {
      const digits = unit === 'кг' ? 0 : 1;
      return `${formatNumber(value, digits)} ${unit}`;
    }

    function buildRecipeRows(stage) {
      return stage.reagents.map((reagent, index) => {
        const [name, purpose, unit, baseNorm] = reagent;
        const norm = getNorm(stage.id, index, Number(baseNorm) || 0);
        const totalQty = norm * stage.totalPrepared;
        return `<tr><td>${name}</td><td>${purpose}</td><td>${unit}</td><td>${formatNumber(norm, 3)}</td><td>${formatQty(totalQty, unit)}</td></tr>`;
      }).join('');
    }

    function getRecommendation(stage) {
      return escapeHtml(savedRecommendations[stage.id] || stage.defaultRecommendation);
    }

      if (type === 'sand') return 'l-sand';
      if (type === 'clay') return 'l-clay';
      if (type === 'prod') return 'l-prod';
      if (type === 'risk') return 'l-risk';
      return 'l-mix';

    function renderPressureChart() {
      const width = 920;
      const height = 540;
      const margin = { top: 20, right: 72, bottom: 52, left: 72 };
      const plotWidth = width - margin.left - margin.right;
      const plotHeight = height - margin.top - margin.bottom;
      const maxDepth = Math.max(...pressureTemp.map((row) => row.bottom));
      const maxPress = Math.max(...pressureTemp.map((row) => row.mining));
      const maxTemp = Math.max(...pressureTemp.map((row) => row.temp));
      const scaleX = (value) => margin.left + (value / maxDepth) * plotWidth;
      const scalePressureY = (value) => margin.top + plotHeight - (value / maxPress) * plotHeight;
      const scaleTempY = (value) => margin.top + plotHeight - (value / maxTemp) * plotHeight;

      const gridX = Array.from({ length: 9 }, (_, index) => {
        const x = margin.left + (plotWidth / 8) * index;
        const value = (maxDepth / 8) * index;
        return `<line x1="${x}" y1="${margin.top}" x2="${x}" y2="${height - margin.bottom}" stroke="rgba(23,48,74,0.10)" />
          <text x="${x}" y="${height - margin.bottom + 22}" font-size="11" fill="#708397" text-anchor="middle">${formatNumber(value, 0)}</text>`;
      }).join('');

      const gridYLeft = Array.from({ length: 6 }, (_, index) => {
        const y = margin.top + (plotHeight / 5) * index;
        const value = maxTemp - (maxTemp / 5) * index;
        return `<line x1="${margin.left}" y1="${y}" x2="${width - margin.right}" y2="${y}" stroke="rgba(23,48,74,0.08)" />
          <text x="${margin.left - 12}" y="${y + 4}" font-size="11" fill="#2b7ea3" text-anchor="end">${formatNumber(value, 0)}</text>`;
      }).join('');

      const gridYRight = Array.from({ length: 6 }, (_, index) => {
        const y = margin.top + (plotHeight / 5) * index;
        const value = maxPress - (maxPress / 5) * index;
        return `<text x="${width - margin.right + 12}" y="${y + 4}" font-size="11" fill="#a66c1c">${formatNumber(value, 3)}</text>`;
      }).join('');

      const tempPath = pressureTemp.map((row, index) => {
        const x = scaleX((row.top + row.bottom) / 2);
        const y = scaleTempY(row.temp);
        return `${index === 0 ? 'M' : 'L'} ${x} ${y}`;
      }).join(' ');

      const pressPath = pressureTemp.map((row, index) => {
        const x = scaleX((row.top + row.bottom) / 2);
        const y = scalePressureY(row.mining);
        return `${index === 0 ? 'M' : 'L'} ${x} ${y}`;
      }).join(' ');

      const points = pressureTemp.map((row) => {
        const x = scaleX((row.top + row.bottom) / 2);
        const tempY = scaleTempY(row.temp);
        const pressY = scalePressureY(row.mining);
        return `
          <circle cx="${x}" cy="${tempY}" r="4" fill="#2b7ea3" stroke="#fff" stroke-width="2" />
          <circle cx="${x}" cy="${pressY}" r="4" fill="#d39b33" stroke="#fff" stroke-width="2" />
          <text x="${x}" y="${Math.min(tempY, pressY) - 10}" font-size="10" fill="#5a6c80" text-anchor="middle">${row.label}</text>`;
      }).join('');

      return createSvg(width, height, `
        <rect x="0" y="0" width="${width}" height="${height}" rx="18" fill="#ffffff" />
        ${gridX}
        ${gridYLeft}
        ${gridYRight}
        <line x1="${margin.left}" y1="${margin.top}" x2="${margin.left}" y2="${height - margin.bottom}" stroke="#2b7ea3" stroke-width="1.5" />
        <line x1="${width - margin.right}" y1="${margin.top}" x2="${width - margin.right}" y2="${height - margin.bottom}" stroke="#d39b33" stroke-width="1.5" />
        <line x1="${margin.left}" y1="${height - margin.bottom}" x2="${width - margin.right}" y2="${height - margin.bottom}" stroke="#7e93a9" stroke-width="1.5" />
        <path d="${tempPath}" fill="none" stroke="#2b7ea3" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
        <path d="${pressPath}" fill="none" stroke="#d39b33" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
        ${points}
        <text x="${width / 2}" y="${height - 12}" font-size="12" fill="#708397" text-anchor="middle">Глубина по вертикали, м</text>
        <text x="18" y="${height / 2}" font-size="12" fill="#2b7ea3" text-anchor="middle" transform="rotate(-90 18 ${height / 2})">Температура, °C</text>
        <text x="${width - 12}" y="${height / 2}" font-size="12" fill="#a66c1c" text-anchor="middle" transform="rotate(-90 ${width - 12} ${height / 2})">Горное давление, МПа/м</text>
      `);
    }

    function renderVerticalProfile(rows) {

      const plotWidth = width - margin.left - margin.right;

      const scaleX = (value) => margin.left + (value / maxX) * plotWidth;

      const horizontalGrid = Array.from({ length: 9 }, (_, index) => {

        return `<line x1="${margin.left}" y1="${y}" x2="${width - margin.right}" y2="${y}" stroke="rgba(23,48,74,0.10)" />
          <text x="${margin.left - 12}" y="${y + 4}" font-size="11" fill="#708397" text-anchor="end">${formatNumber(value, 0)}</text>`;

    function renderHorizontalProfile(rows) {
      const width = 960;
      const height = 560;
      const margin = { top: 24, right: 24, bottom: 56, left: 72 };
      const points = rows.map((row) => {
        const rad = (row.depAzimuth * Math.PI) / 180;
        return { ...row, east: row.departure * Math.sin(rad), north: row.departure * Math.cos(rad) };
      });

      const minX = Math.min(...points.map((point) => point.east));
      const maxX = Math.max(...points.map((point) => point.east));
      const minY = Math.min(...points.map((point) => point.north));
      const maxY = Math.max(...points.map((point) => point.north));
      const plotWidth = width - margin.left - margin.right;
      const plotHeight = height - margin.top - margin.bottom;
      const scaleX = (value) => margin.left + ((value - minX) / (maxX - minX || 1)) * plotWidth;
      const scaleY = (value) => margin.top + ((maxY - value) / (maxY - minY || 1)) * plotHeight;

      const verticalGrid = Array.from({ length: 9 }, (_, index) => {

        const value = minX + ((maxX - minX) / 8) * index;

        return `<line x1="${margin.left}" y1="${y}" x2="${width - margin.right}" y2="${y}" stroke="rgba(23,48,74,0.10)" />

        ${horizontalGrid}
        <line x1="${margin.left}" y1="${margin.top}" x2="${margin.left}" y2="${height - margin.bottom}" stroke="#7e93a9" stroke-width="1.5" />

          <div class="single-visual">
            <div class="visual-card">
              <h3>Цветная литологическая колонка</h3>
              <div class="strat-column" id="stratColumn"></div>
              <div class="visual-caption">Полная литологическая колонка встроена в программу как приложение к инженерной части. Сохраняется стратиграфическая последовательность, литологическое описание и быстрые геомеханические маркеры.</div>
            </div>
          </div>
          <div class="visual-grid">
            <div class="visual-card">
              <h3>Профиль давления и температуры</h3>
              <div class="svg-shell" id="pressureChart"></div>
            </div>
            <div class="visual-card">
              <h3>Водонасыщенные горизонты</h3>
              <table class="doc-table">
                <thead><tr><th>Горизонт</th><th>Интервал</th><th>Минерализация, г/л</th><th>Тип воды</th></tr></thead>
                <tbody id="waterTableBody"></tbody>
              </table>
            </div>
          </div>
          <div class="dual-grid">
            <div class="visual-card">
              <h3>Графическая схема конструкции скважины</h3>
              <div class="svg-shell" id="constructionSchematic"></div>
            </div>
            <div class="visual-card">
              <h3>Проектные профили скважины</h3>
              <div class="single-visual">
                <div>
                  <div class="svg-shell" id="verticalChart"></div>
                  <div class="visual-caption">Вертикальная проекция по таблице 4.2.</div>
                </div>
                <div>
                  <div class="svg-shell" id="horizontalChart"></div>
                  <div class="visual-caption">Горизонтальная проекция по таблице 4.3.</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="sheet">
        <div class="section">
          <h2 class="section-title">5. Программа по интервалам</h2>
          <div class="section-note">Ниже приведены детальные блоки по каждому интервалу: проектная система, параметры раствора, рецептура на приготовляемый объем и рекомендации по бурению. Если на основной странице были вручную откорректированы нормы расхода или рекомендации, здесь автоматически подставляются актуальные значения из сохраненного состояния.</div>
        </div>

        ${stages.map((stage, stageIndex) => `
          <article class="program-block">
            <h3 class="block-title">5.${stageIndex + 1}. ${stage.title}</h3>
            <div class="pill-row">
              <span class="pill">Интервал ${stage.range}</span>
              <span class="pill">${stage.altRange}</span>
              <span class="pill">${stage.system}</span>
            </div>

            <div class="summary-grid">
              <div class="summary-card"><strong>Плотность</strong><span>${formatNumber(stage.density, 0)} кг/м³</span></div>
              <div class="summary-card"><strong>Приготовить всего</strong><span>${formatNumber(stage.totalPrepared, 0)} м³</span></div>
              <div class="summary-card"><strong>Рабочий объем / конечный объем</strong><span>${formatNumber(stage.workingVolume, 2)} / ${formatNumber(stage.finalVolume, 2)} м³</span></div>
              <div class="summary-card"><strong>Переведено / ожидаемые потери</strong><span>${formatNumber(stage.carryOver, 0)} / ${formatNumber(stage.losses, 0)} м³</span></div>
              <div class="summary-card"><strong>Долото</strong><span>${stage.bit}</span></div>
              <div class="summary-card"><strong>Колонна</strong><span>${stage.casing}</span></div>
            </div>

            <div class="interval-note">${stage.notes}</div>

            <div class="interval-grid">
              <div class="interval-card">
                <strong>Параметры раствора</strong>
                <table class="mini-table">
                  <thead><tr><th>Параметр</th><th>Значение</th></tr></thead>
                  <tbody>${stage.params.map((row) => `<tr><td>${row[0]}</td><td>${row[1]}</td></tr>`).join('')}</tbody>
                </table>
              </div>

              <div class="interval-card">
                <strong>Возможные осложнения</strong>
                <ul class="risk-list">${stage.complications.map((item) => `<li>${item}</li>`).join('')}</ul>
              </div>
            </div>

            <div>
              <p class="stage-table-caption">Рецептура рассчитана на объем приготовления по стадии. Нормы расхода на 1 м³ берутся из действующего интервалного модуля с учетом возможных ручных корректировок.</p>
              <table class="doc-table">
                <thead><tr><th>Компонент</th><th>Назначение</th><th>Ед.</th><th>Норма на 1 м³</th><th>Потребность на стадию</th></tr></thead>
                <tbody>${buildRecipeRows(stage)}</tbody>
              </table>
            </div>

            <div class="recommendation-box"><strong>Рекомендации при бурении.</strong> ${getRecommendation(stage)}</div>
          </article>
        `).join('')}

        <div class="footer-note">Документ сформирован автоматически. Перед выпуском рабочей редакции рекомендуется дополнительно проверить соответствие объемов, рецептур, окон плотности и аварийных сценариев актуальному проекту и требованиям заказчика.</div>
      </section>
    `;

    document.getElementById('stratColumn').innerHTML = stratData.map((layer) => `
      <article class="layer ${typeClass(layer.type)}">
        <div class="layer-depth">${formatNumber(layer.top, 0)}-${formatNumber(layer.bottom, 0)} м</div>
        <div class="layer-body">
          <h4>${layer.name} (${layer.index})</h4>
          <p>${layer.lith} ${layer.summary}</p>
          <div class="layer-meta">
            <span class="geo-pill">падение ${layer.dip}</span>
            <span class="geo-pill">азимут ${layer.azimuth}</span>
            <span class="geo-pill">кав. ${layer.cavern}</span>
          </div>
        </div>
      </article>
    `).join('');

    document.getElementById('pressureChart').innerHTML = renderPressureChart();
    document.getElementById('waterTableBody').innerHTML = waterData.map((item) => `
      <tr>
        <td>${item.name}</td>
        <td>${item.interval}</td>
        <td>${formatNumber(item.mineralization, 1)}</td>
        <td>${item.type}</td>
      </tr>
    `).join('');
    document.getElementById('constructionSchematic').innerHTML = createConstructionSchematic();
    document.getElementById('verticalChart').innerHTML = renderVerticalProfile(pilotProfile);
    document.getElementById('horizontalChart').innerHTML = renderHorizontalProfile(horizontalProfile);
  </script>
  <script src="assets/js/global-auth-widget.js"></script>
</body>
</html>
