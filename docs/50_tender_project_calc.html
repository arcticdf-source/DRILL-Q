<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>50 · Рассчитать проект (тендер)</title>
  <style>
    body { background: #0b1220; color: #e6edf7; font-family: 'Manrope', sans-serif; margin: 0; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 32px 0; }
    .top { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .back { color: #1ad8b5; text-decoration: none; font-weight: 700; }
    h1 { font-size: 2.2em; margin: 0 0 12px; }
    .desc { color: #b0c2db; margin-bottom: 18px; }
    .section { margin-bottom: 28px; }
    .label { color: #9ab0c7; font-size: 13px; text-transform: uppercase; margin-bottom: 6px; display: block; }
    .value { font-size: 1.1em; font-weight: 600; }
    .input-row { display: flex; gap: 10px; margin-bottom: 18px; }
    input[type="text"] { flex: 1; border-radius: 8px; border: 1px solid #2b3954; background: #16243a; color: #e6edf7; padding: 10px 12px; font-size: 1em; }
    button { border-radius: 8px; border: none; background: linear-gradient(135deg,#8bf5e6,#1ad8b5); color: #0a1d1a; font-weight: 700; padding: 10px 18px; cursor: pointer; }
    .result { margin-top: 24px; padding: 18px; background: #17253b; border-radius: 12px; color: #b0ffc9; font-size: 1.1em; }
  </style>
  <script src="../nav-inject.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back" href="56_fields_projects_dashboard.html">← Мои проекты</a>
    </div>
    <h1>Рассчитать проект (тендер)</h1>
    <div class="desc">Введите исходные данные для расчёта тендерного проекта. Здесь появятся результаты после загрузки и анализа документов.</div>
    <div class="section">
      <div class="input-row">
        <input id="projectName" type="text" placeholder="Название проекта" />
        <button id="calcBtn">Рассчитать</button>
      </div>
      <div id="result" class="result" style="display:none"></div>
    </div>
  </div>
  <script>
    document.getElementById('calcBtn').onclick = function() {
      const name = document.getElementById('projectName').value.trim();
      if (!name) {
        document.getElementById('result').style.display = 'block';
        document.getElementById('result').textContent = 'Пожалуйста, введите название проекта.';
        return;
      }
      document.getElementById('result').style.display = 'block';
      document.getElementById('result').textContent = `Проект "${name}": расчет выполнен (пример, интеграция с анализом документов возможна).`;
    };
  </script>
  <script src="assets/js/global-auth-widget.js"></script>
</body>
</html>
