<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>144 · Nexus Catalog Workbench</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Condensed:wght@500;600;700&display=swap");

    :root {
      --panel: rgba(255, 255, 255, 0.96);
      --surface: #f8fbfd;
      --line: rgba(18, 48, 71, 0.12);
      --text: #17324a;
      --muted: #617487;
      --gold: #ba7a1f;
      --mint: #0e7490;
      --cyan: #2f6fa3;
      --danger: #c0563c;
      --success: #1f7a4f;
      --shadow: 0 22px 56px rgba(28, 51, 84, 0.1);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "IBM Plex Sans", sans-serif;
      background:
        radial-gradient(820px 420px at 0% 0%, rgba(14, 116, 144, 0.08), transparent 70%),
        radial-gradient(780px 420px at 100% 0%, rgba(186, 122, 31, 0.1), transparent 72%),
        linear-gradient(180deg, #f7fafc 0%, #eef3f6 54%, #e9eef2 100%);
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(to right, rgba(23, 50, 74, 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(23, 50, 74, 0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      opacity: 0.45;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1480px, calc(100% - 32px));
      margin: 0 auto;
      padding: 20px 0 42px;
    }

    .topbar,
    .hero,
    .workspace,
    .panel,
    .side-panel,
    .summary-box,
    .product-row,
    .supplier-card {
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      margin-bottom: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .brand-mark {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ebaf54 0%, #d1811d 100%);
      box-shadow: 0 0 0 6px rgba(209, 129, 29, 0.12);
    }

    .top-actions,
    .toggle-row,
    .hero-actions,
    .chip-row,
    .row-actions,
    .panel-actions,
    .supplier-stats,
    .shortlist-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .button,
    .button-secondary,
    .toggle,
    .chip,
    .row-button,
    .mini-button,
    .remove-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid rgba(18, 48, 71, 0.12);
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
    }

    .button,
    .row-button.primary,
    .mini-button.primary {
      color: #ffffff;
      background: linear-gradient(135deg, #d38b28 0%, #b56f16 100%);
      border-color: rgba(181, 111, 22, 0.45);
    }

    .remove-button {
      min-width: 40px;
      padding: 0;
      color: var(--danger);
      background: rgba(192, 86, 60, 0.08);
      border-color: rgba(192, 86, 60, 0.18);
    }

    .toggle.active,
    .chip.active {
      background: rgba(14, 116, 144, 0.1);
      border-color: rgba(14, 116, 144, 0.3);
      color: var(--mint);
    }

    .mini-button {
      min-height: 34px;
      padding: 0 12px;
      font-size: 11px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.36fr) minmax(320px, 0.64fr);
      gap: 18px;
      padding: 26px;
      margin-bottom: 16px;
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -80px;
      bottom: -80px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(47, 111, 163, 0.12), transparent 72%);
      pointer-events: none;
    }

    .eyebrow,
    .tag,
    .status-pill,
    .row-tag,
    .small-label,
    .supplier-badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .eyebrow,
    .tag,
    .row-tag,
    .small-label {
      background: rgba(14, 116, 144, 0.1);
      color: var(--mint);
    }

    .status-pill,
    .supplier-badge {
      background: rgba(31, 122, 79, 0.1);
      color: var(--success);
    }

    h1,
    h2,
    h3 {
      margin: 0;
      font-family: "IBM Plex Sans Condensed", sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin-top: 14px;
      font-size: clamp(38px, 4.8vw, 66px);
      line-height: 0.94;
      max-width: 820px;
    }

    .hero-copy,
    .panel-copy,
    .muted,
    .row-copy,
    .shortlist-copy,
    .summary-copy,
    .supplier-copy,
    .empty {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .hero-copy {
      margin-top: 16px;
      max-width: 760px;
    }

    .hero-metrics,
    .hero-side,
    .status-list,
    .filter-stack,
    .results-list,
    .shortlist-list,
    .supplier-grid {
      display: grid;
      gap: 12px;
    }

    .hero-metrics {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 22px;
    }

    .metric-box {
      padding: 16px;
      border-radius: 22px;
      background: var(--surface);
      border: 1px solid rgba(18, 48, 71, 0.08);
    }

    .metric-value {
      margin-top: 8px;
      font-family: "IBM Plex Sans Condensed", sans-serif;
      font-size: 32px;
      line-height: 1;
      color: var(--gold);
    }

    .workspace {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 330px;
      gap: 16px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .side-panel,
    .panel {
      padding: 18px;
      background: var(--surface);
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .search-bar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      padding: 14px;
      border-radius: 24px;
      border: 1px solid rgba(18, 48, 71, 0.1);
      background: linear-gradient(135deg, #f9fbfd 0%, #eef5fb 100%);
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 56px;
      padding: 0 16px;
      border-radius: 18px;
      border: 1px solid rgba(18, 48, 71, 0.08);
      background: #ffffff;
    }

    .search-box input {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font: inherit;
    }

    .search-box input::placeholder {
      color: rgba(97, 116, 135, 0.8);
    }

    .filter-group,
    .shortlist-item,
    .summary-box {
      padding: 14px;
      border-radius: 20px;
      background: #ffffff;
      border: 1px solid rgba(18, 48, 71, 0.08);
    }

    .filter-items {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .filter-row,
    .status-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      font-size: 13px;
      color: var(--muted);
    }

    .filter-row strong,
    .status-row strong {
      color: var(--text);
    }

    .result-head,
    .result-grid,
    .shortlist-row,
    .supplier-top {
      display: grid;
      gap: 12px;
      align-items: center;
    }

    .result-head,
    .result-grid {
      grid-template-columns: minmax(0, 1.5fr) 140px 150px 140px 140px 120px;
    }

    .result-head {
      margin-bottom: 12px;
    }

    .result-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .product-row {
      padding: 16px 18px;
      background: #ffffff;
    }

    .product-title {
      font-family: "IBM Plex Sans Condensed", sans-serif;
      font-size: 28px;
      line-height: 1;
      text-transform: uppercase;
    }

    .row-copy {
      margin-top: 8px;
      max-width: 560px;
    }

    .cell {
      display: grid;
      gap: 4px;
    }

    .cell strong {
      color: var(--text);
      font-size: 14px;
    }

    .cell span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .row-actions {
      margin-top: 14px;
    }

    .summary-value {
      margin-top: 8px;
      font-family: "IBM Plex Sans Condensed", sans-serif;
      font-size: 34px;
      line-height: 1;
    }

    .shortlist-list {
      margin-top: 14px;
      max-height: 520px;
      overflow: auto;
    }

    .shortlist-row {
      grid-template-columns: minmax(0, 1fr) auto;
    }

    .shortlist-title {
      font-weight: 700;
      color: var(--text);
      line-height: 1.45;
    }

    .supplier-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .supplier-card {
      padding: 18px;
      background: var(--surface);
    }

    .supplier-top {
      grid-template-columns: minmax(0, 1fr) auto;
    }

    .supplier-name {
      margin-top: 10px;
      font-family: "IBM Plex Sans Condensed", sans-serif;
      font-size: 24px;
      line-height: 1;
      text-transform: uppercase;
    }

    .supplier-value {
      font-family: "IBM Plex Sans Condensed", sans-serif;
      font-size: 30px;
      line-height: 1;
      color: var(--gold);
    }

    .supplier-stats {
      margin-top: 12px;
    }

    .stat-chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(23, 50, 74, 0.06);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .hidden { display: none; }

    @media (max-width: 1260px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .supplier-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 1040px) {
      .hero,
      .hero-metrics,
      .result-head,
      .result-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 20px, 1480px);
      }

      .topbar,
      .hero,
      .hero-metrics,
      .search-bar,
      .result-head,
      .result-grid,
      .supplier-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
  <script src="../nav-inject.js"></script>
</head>
<body>
  <main class="page">
    <section class="topbar" aria-label="Верхняя навигация Nexus Catalog">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span id="brandLabel">Nexus Catalog Workbench</span>
      </div>
      <div class="top-actions">
        <a class="button-secondary" href="../index.html">Nexus</a>
        <a class="button-secondary" href="143_nexus_marketplace_hub.html">Marketplace Hub</a>
        <a class="button" href="146_nexus_rfq_command.html" id="rfqTopCta">Open RFQ</a>
      </div>
    </section>

    <section class="hero">
      <article>
        <span class="eyebrow" id="heroEyebrow"></span>
        <h1 id="heroTitle"></h1>
        <p class="hero-copy" id="heroCopy"></p>
        <div class="hero-actions" style="margin-top: 22px;">
          <a class="button" href="145_nexus_supplier_trust_desk.html" id="supplierCta"></a>
          <a class="button-secondary" href="146_nexus_rfq_command.html" id="heroRfqCta"></a>
        </div>
        <div class="hero-metrics" id="heroMetrics"></div>
      </article>

      <aside class="hero-side">
        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="tag" id="langTag"></div>
              <h2 id="langTitle"></h2>
              <p class="panel-copy" id="langCopy"></p>
            </div>
            <div class="status-pill" id="langStatus"></div>
          </div>
          <div class="toggle-row">
            <button class="toggle active" data-lang="ru" type="button">RU</button>
            <button class="toggle" data-lang="en" type="button">EN</button>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="tag" id="unitTag"></div>
              <h2 id="unitTitle"></h2>
              <p class="panel-copy" id="unitCopy"></p>
            </div>
            <div class="status-pill" id="unitStatus"></div>
          </div>
          <div class="toggle-row">
            <button class="toggle active" data-unit="si" type="button">SI</button>
            <button class="toggle" data-unit="field" type="button">Field</button>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="tag" id="focusTag"></div>
              <h2 id="focusTitle"></h2>
              <p class="panel-copy" id="focusCopy"></p>
            </div>
          </div>
          <div class="chip-row" id="categoryChips"></div>
          <div class="status-list" id="focusList"></div>
        </div>
      </aside>
    </section>

    <section class="workspace">
      <aside class="side-panel">
        <div class="panel-head">
          <div>
            <div class="tag" id="filterTag"></div>
            <h2 id="filterTitle"></h2>
            <p class="panel-copy" id="filterCopy"></p>
          </div>
        </div>
        <div class="filter-stack" id="filterStack"></div>
      </aside>

      <section>
        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="tag" id="searchTag"></div>
              <h2 id="searchTitle"></h2>
              <p class="panel-copy" id="searchCopy"></p>
            </div>
            <div class="panel-actions" id="searchActions"></div>
          </div>
          <div class="search-bar">
            <label class="search-box" for="catalogSearchInput">
              <span>⌕</span>
              <input id="catalogSearchInput" type="text" />
            </label>
            <button class="button-secondary" id="clearFiltersButton" type="button"></button>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="tag" id="resultsTag"></div>
              <h2 id="resultsTitle"></h2>
              <p class="panel-copy" id="resultsCopy"></p>
            </div>
            <div class="status-pill" id="resultsStatus"></div>
          </div>
          <div class="result-head" id="resultHead"></div>
          <div class="results-list" id="resultsList"></div>
          <div class="empty hidden" id="emptyState"></div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="tag" id="supplierLaneTag"></div>
              <h2 id="supplierLaneTitle"></h2>
              <p class="panel-copy" id="supplierLaneCopy"></p>
            </div>
          </div>
          <div class="supplier-grid" id="supplierGrid"></div>
        </div>
      </section>

      <aside class="side-panel">
        <div class="panel-head">
          <div>
            <div class="tag" id="shortlistTag"></div>
            <h2 id="shortlistTitle"></h2>
            <p class="shortlist-copy" id="shortlistCopy"></p>
          </div>
          <div class="status-pill" id="shortlistStatus"></div>
        </div>

        <div class="summary-box">
          <div class="small-label" id="summaryLabel"></div>
          <div class="summary-value" id="summaryValue"></div>
          <div class="summary-copy" id="summaryCopy"></div>
        </div>

        <div class="shortlist-list" id="shortlistList"></div>
        <div class="empty" id="shortlistEmpty"></div>

        <div class="shortlist-actions">
          <button class="button" id="exportButton" type="button"></button>
          <button class="button-secondary" id="clearShortlistButton" type="button"></button>
        </div>
      </aside>
    </section>
  </main>
  <script src="assets/js/global-auth-widget.js"></script>

            product.application[state.lang],
            copy().categoryNames[product.category]

          var matchesCategory = state.category === 'all' || product.category === state.category;
          return matchesQuery && matchesCategory;
        });
