<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Раздел скважины</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap");
    :root {
      --bg-0:#070d15; --bg-1:#111f33; --bg-2:#1d3247;
      --panel:rgba(10,20,33,.85); --line:rgba(226,237,255,.16); --line-soft:rgba(226,237,255,.10);
      --text:#ecf4ff; --muted:#a8bdd2; --cyan:#20d9b4; --amber:#ffbf66; --blue:#8db4ff; --violet:#c6a6ff; --danger:#ff8d78; --ok:#83f0bf;
      --i1:#6fd7b7; --i2:#8db4ff; --i3:#ffd089; --i4:#f7b072; --i5:#c6a6ff;
      --shadow:0 24px 56px rgba(0,0,0,.42);
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:"Manrope",sans-serif;color:var(--text);background:radial-gradient(900px 460px at 0% -10%,rgba(32,217,180,.18),transparent),radial-gradient(820px 460px at 100% 0%,rgba(255,191,102,.18),transparent),linear-gradient(145deg,var(--bg-0),var(--bg-1) 46%,var(--bg-2))}
    .wrap{width:min(1320px,94vw);margin:0 auto;padding:24px 0 64px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid var(--line-soft);border-radius:14px;padding:12px 14px;background:rgba(8,15,24,.66);position:sticky;top:12px;z-index:20}
    .brand{display:flex;align-items:center;gap:10px;font-family:"Oswald",sans-serif;text-transform:uppercase;letter-spacing:.05em;font-size:20px}.dot{width:12px;height:12px;border-radius:999px;background:radial-gradient(circle at 35% 35%,#d6fff7,var(--cyan))}
    .nav{display:flex;flex-wrap:wrap;gap:8px}.nav a{text-decoration:none;font-size:12px;text-transform:uppercase;letter-spacing:.06em;font-weight:800;border-radius:10px;padding:8px 12px;color:#082922;background:linear-gradient(130deg,#a0f9eb,#22d7b4);border:1px solid rgba(34,215,180,.75)}
    .hero,.panel{margin-top:18px;border:1px solid var(--line);border-radius:22px;background:var(--panel);box-shadow:var(--shadow);padding:22px}
    .hero h1{margin:0 0 10px;font-family:"Oswald",sans-serif;font-size:clamp(28px,4vw,44px)}.hero p{margin:0;color:#c7d7ec;line-height:1.65}
    .meta{margin-top:14px;display:inline-flex;border:1px solid var(--line-soft);border-radius:999px;padding:6px 12px;font-size:12px;color:#d8e5f6;text-transform:uppercase;letter-spacing:.08em}

    .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}.chip{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line-soft);border-radius:999px;padding:5px 11px;font-size:12px;color:#d6e5f7;background:rgba(255,255,255,.03)}.dot-chip{width:12px;height:12px;border-radius:999px}

    .grid-2{display:grid;grid-template-columns:1.15fr .85fr;gap:16px}.grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
    .card,.metric,.chart-wrap,.table-box,.list-box,.tab-pane,.mini-card{border:1px solid var(--line-soft);border-radius:16px;background:rgba(255,255,255,.03);padding:14px}
    .card h3,.chart-wrap h3,.table-box h3,.list-box h3,.mini-card h3{margin:0 0 10px;font-size:16px}.card p,.mini-card p{margin:0;color:#ccdcf0;line-height:1.6;font-size:13px}.metric .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.metric .v{margin-top:6px;font-size:15px;line-height:1.45}
    .note{margin-top:12px;border:1px solid rgba(198,166,255,.24);border-radius:14px;background:rgba(198,166,255,.08);padding:12px;color:#e2d8ff;font-size:13px;line-height:1.55}
    .tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}.tab-btn{font-family:"Manrope",sans-serif;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.06em;border:2px solid var(--line);border-radius:12px;padding:10px 16px;background:rgba(255,255,255,.04);color:var(--muted);cursor:pointer;transition:all .2s}.tab-btn.active,.tab-btn:hover{transform:translateY(-1px)}.tab-btn.i1.active,.tab-btn.i1:hover{background:var(--i1);border-color:transparent;color:#06241c}.tab-btn.i2.active,.tab-btn.i2:hover{background:var(--i2);border-color:transparent;color:#071a2d}.tab-btn.i3.active,.tab-btn.i3:hover{background:var(--i3);border-color:transparent;color:#2b1900}.tab-btn.i4.active,.tab-btn.i4:hover{background:var(--i4);border-color:transparent;color:#2c1303}.tab-btn.i5.active,.tab-btn.i5:hover{background:var(--i5);border-color:transparent;color:#1a0d35}
    .tab-pane{display:none}.tab-pane.active{display:block}
    .stripe{border-radius:16px;padding:18px 20px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}.stripe .name{font-family:"Oswald",sans-serif;font-size:28px;line-height:1}.stripe .system{font-size:13px;font-weight:700;opacity:.92}.stripe .meta-row{display:flex;flex-wrap:wrap;gap:8px;width:100%}.pill{display:inline-flex;border-radius:999px;padding:5px 10px;background:rgba(0,0,0,.26);font-size:12px;font-weight:700}
    .vol-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.vol-card{border:1px solid var(--line-soft);border-radius:12px;padding:10px 12px;background:rgba(255,255,255,.03)}.vol-card .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.vol-card .val{margin-top:4px;font-size:18px;font-weight:800}
    table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid var(--line-soft);padding:9px 10px;text-align:left;vertical-align:top}th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#bfd3e8;background:rgba(255,255,255,.04)}tr:last-child td{border-bottom:none}.table-wrap{overflow:auto}.u{color:var(--muted);font-size:12px}.good{color:var(--ok);font-weight:700}.warn{color:var(--amber);font-weight:700}.bad{color:var(--danger);font-weight:700}
    .price-input,.price-select{width:100%;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.05);color:var(--text);padding:8px 10px;font:inherit}.price-input:focus,.price-select:focus{outline:none;border-color:var(--cyan);background:rgba(32,217,180,.08)}
    .price-select option{color:#06121d}.price-unit{font-weight:800;color:var(--amber)}.price-total{font-weight:800;color:var(--ok)}.subtle{color:var(--muted);font-size:12px;line-height:1.5}
    .norm-input{width:110px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.05);color:var(--text);padding:7px 9px;font:inherit}

    .interval-recommendation-box{margin-top:14px;border:1px solid var(--line-soft);border-radius:16px;background:rgba(255,255,255,.03);padding:14px}

    .interval-recommendation-input:focus{outline:none;border-color:var(--cyan);background:rgba(32,217,180,.08)}
    .program-launch{display:grid;gap:14px;align-items:center}
    .program-launch p{margin:0;color:#cfe0f2;line-height:1.7;font-size:14px}
    .program-launch-btn{display:flex;align-items:center;justify-content:center;min-height:108px;padding:24px 28px;border-radius:24px;text-decoration:none;font-family:"Oswald",sans-serif;font-size:34px;letter-spacing:.04em;text-transform:uppercase;color:#06261f;background:linear-gradient(135deg,#d8fff6 0%,#79f1d8 42%,#24d6b4 100%);border:1px solid rgba(34,215,180,.8);box-shadow:0 24px 48px rgba(34,215,180,.18);transition:transform .2s ease,filter .2s ease}

    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}.btn{display:inline-flex;align-items:center;gap:7px;font-family:"Manrope",sans-serif;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.07em;border-radius:12px;padding:10px 20px;cursor:pointer;border:2px solid transparent;transition:all .2s;text-decoration:none}.btn-cyan{background:linear-gradient(130deg,#a0f9eb,#22d7b4);color:#062b22}.btn:hover{filter:brightness(1.1);transform:translateY(-1px)}.btn-dmr{justify-content:center;min-width:min(100%,420px);padding:28px 34px;border-radius:22px;font-size:30px;letter-spacing:.12em;box-shadow:0 20px 40px rgba(34,215,180,.18)}
    .chart-shell{width:100%;overflow:auto}.chart-shell svg{width:100%;height:auto;display:block}.bars{display:grid;gap:10px}.bar-row{display:grid;grid-template-columns:160px 1fr 84px;gap:10px;align-items:center}.bar-label{font-size:12px;color:#dbe8f8}.bar-track{height:12px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--cyan),var(--blue))}.bar-val{font-size:12px;color:#bfd3e8;text-align:right}
    .range-grid{display:grid;gap:12px}.range-row{display:grid;grid-template-columns:180px 1fr 110px;gap:10px;align-items:center}.range-name{font-size:12px;color:#dbe8f8}.range-track{position:relative;height:16px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden}.range-span{position:absolute;top:0;bottom:0;border-radius:999px}.range-meta{font-size:12px;color:#bfd3e8;text-align:right}.depth-map{display:grid;gap:12px}.depth-row{display:grid;grid-template-columns:180px 1fr 110px;gap:10px;align-items:center}.depth-name{font-size:12px;color:#dbe8f8}.depth-track{position:relative;height:18px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden}.depth-span{position:absolute;top:0;bottom:0;border-radius:999px}.depth-meta{font-size:12px;color:#bfd3e8;text-align:right}.kpi-stack{display:grid;gap:10px}.kpi-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.kpi-box{border:1px solid var(--line-soft);border-radius:12px;padding:12px;background:rgba(255,255,255,.03)}.kpi-box .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.kpi-box .v{margin-top:5px;font-size:14px;line-height:1.5}.eyebrow{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line-soft);border-radius:999px;padding:5px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#d7e6f7;background:rgba(255,255,255,.04);margin-bottom:8px}.system-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.system-card{border:1px solid var(--line-soft);border-radius:16px;background:rgba(255,255,255,.03);padding:14px}.system-card h4{margin:0 0 8px;font-size:15px;color:#edf4ff}.system-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}.system-pill{display:inline-flex;border-radius:999px;padding:5px 10px;background:rgba(255,255,255,.06);font-size:11px;font-weight:800;color:#dce9f8;text-transform:uppercase;letter-spacing:.06em}.schematic-box{border:1px solid var(--line-soft);border-radius:16px;background:rgba(255,255,255,.03);padding:12px}.schematic-box svg{width:100%;height:auto;display:block}.caption{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.55}
    .list{display:grid;gap:10px}.item{border:1px solid var(--line-soft);border-radius:12px;padding:12px;background:rgba(255,255,255,.03);color:#d1def0;line-height:1.55;font-size:14px}
    .footer{margin-top:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-size:12px;text-align:center}

    @media (max-width:860px){.top{position:static;flex-direction:column;align-items:flex-start}.hero-stats,.grid-4,.grid-3,.grid-2,.vol-grid,.system-grid{grid-template-columns:1fr}.bar-row,.depth-row,.range-row{grid-template-columns:1fr}.section-head{flex-direction:column;align-items:flex-start}}

  <script src="../nav-inject.js"></script>

<body>
  <main class="wrap">
    <header class="top">
      <div class="brand"><span class="dot"></span><span>Nexus Oilfield AI</span></div>
      <nav class="nav" id="nav"></nav>
    </header>

    <section class="hero">
      <h1 id="title">Раздел скважины</h1>
      <p id="desc">Загрузка...</p>
      <span class="meta" id="meta">Скважинный раздел</span>
      <div id="heroStats" class="hero-stats" hidden></div>
      <div id="heroLegend" class="legend" hidden></div>
    </section>

    <div id="specialContent"></div>

    <section class="panel" id="genericPanel" hidden>
      <h2>Содержимое раздела</h2>
      <div class="list" id="contentList"></div>
    </section>

    <p class="footer">Dynamic well section</p>
  </main>
  <script>
    function getParam(key, fallback) {
      const params = new URLSearchParams(window.location.search);
      return params.get(key) || fallback;
    }

    function buildProjectLink(page, name, well) {
      const params = new URLSearchParams();
      params.set('name', name);
      if (well) {
        params.set('well', well);
      }
      return `${page}?${params.toString()}`;
    }

    function buildWorkDashboardLink(name, well, date) {
      const params = new URLSearchParams();
      params.set('name', name);
      params.set('well', well);
      params.set('date', date);
      return `project_well_work_dashboard.html?${params.toString()}`;
    }

    function buildMudProgramLink(name, well) {
      const params = new URLSearchParams();
      params.set('name', name);
      params.set('well', well);
      return `project_well_mud_program.html?${params.toString()}`;
    }

    function buildCementProgramLink(name, well) {
      const params = new URLSearchParams();
      params.set('name', name);
      params.set('well', well);
      return `project_well_cement_program.html?${params.toString()}`;
    }

    function formatNumber(value, digits = 1, keepTrailingZeros = false) {
      if (typeof value !== 'number' || !Number.isFinite(value)) return value;
      const safeDigits = Math.max(0, digits);
      const isIntegerLike = Math.abs(value - Math.round(value)) < 0.001;
      const minimumFractionDigits = keepTrailingZeros ? safeDigits : (isIntegerLike ? 0 : safeDigits);
      return new Intl.NumberFormat('en-US', {
        minimumFractionDigits,
        maximumFractionDigits: safeDigits
      }).format(value);
    }

    function formatMoney(value) {
      return formatNumber(value, 2, true);
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function createSvg(width, height, inner) {
      return `<svg viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
    }

    function normalizeChemicalName(name) {
      return name.replace(/\s*\([^)]*\)$/u, '').trim();
    }

    function defaultPackaging(name, unit) {
      const lowered = name.toLowerCase();
      if (unit === 'л' || /масло|лубрикант|агент|эмульгатор|вода/i.test(lowered)) return 'бочка';
      if (/барит|caco|кальций хлористый/i.test(lowered)) return 'биг-бэг';
      return 'мешок';
    }

    function defaultPackageWeight(packaging) {
      if (packaging === 'мешок') return 25;
      if (packaging === 'бочка') return 200;
      return 1000;
    }

    const projectName = getParam('name', 'Проект');
    const wellName = getParam('well', '9301');
    const sectionTitle = getParam('section', 'Раздел скважины');
    const sectionNumber = getParam('number', '5');

    document.title = `${projectName} · Скважина ${wellName} · ${sectionTitle}`;
    document.getElementById('title').textContent = `${projectName} · Скважина ${wellName} · Раздел ${sectionNumber}. ${sectionTitle}`;
    document.getElementById('meta').textContent = `${projectName} · Скважина ${wellName}`;

    document.getElementById('nav').innerHTML = `
      <a href="${buildProjectLink('project_well_dashboard.html', projectName, wellName)}">К скважине ${wellName}</a>
      <a href="${buildProjectLink('project_well_dashboard.html', projectName, '9301')}">К проекту</a>
      <a href="${buildProjectLink('project_well_construction.html', projectName, wellName)}">Раздел 3</a>
      <a href="${buildProjectLink('project_well_profile.html', projectName, wellName)}">Раздел 4</a>
    `;

    function renderGenericSection() {
      document.getElementById('desc').textContent = `Раздел "${sectionTitle}" для скважины ${wellName}. Ниже показана первичная авторазметка по доступным PDF и приложениям тендера.`;
      document.getElementById('genericPanel').hidden = false;

      const sectionContentMap = {
        'Углубление скважины': [
          'Источник авторазметки: основное ТЗ и Приложение 3 «Минимальные требования по ННБ».',
          'В ТЗ указано, что в отчетности по каждому рейсу должны отражаться параметры бурения, КНБК по каждому рейсу и гидравлический расчет.',
          'Приложение по ННБ требует расчет траектории одиночной и групповой скважины, антиколлизионный анализ и оптимизацию траекторий.',
          'Подтверждены блоки по инженеру телеметрии MWD/LWD, партии ННБ и оптимизации КНБК под условия бурения.',
          'Статус: логика раздела уже разложена, но режимные таблицы WOB/RPM/ROP нужно дочитать из исходных программ бурения.'
        ],
        'Крепление скважины': [
          'Источник авторазметки: основное ТЗ и Приложение 4 «Требования по цементированию».',
          'По структуре приложения раздел относится к программе цементирования, буферным жидкостям, лабораторным испытаниям и контролю качества крепления.',
          'В схему крепления также включаются устьевое оборудование, колонная головка и фонтанная арматура из основного ТЗ.',
          'Верхнеуровневая раскладка выполнена, детальные интервалы цементирования и составы буферов требуют отдельного ручного переноса.',
          'Следующий шаг: оформить интервалы цементирования, буферные системы и контроль качества крепления в виде таблиц.'
        ],
        'Испытание скважины': [
          'Источник авторазметки: основное ТЗ и раздел по освоению.',
          'Испытание выделено как отдельный проектный контур, а в требованиях ТЗ присутствуют интервалы испытаний и состав оборудования.',

        ],
        'Продолжительность строительства скважины': [

          'Раздел относится к календарному графику строительства скважин 9301, 9302 и 9303 с этапами бурения, цементирования, испытаний и демобилизации.',
          'В ТЗ встречаются нормативы длительности отдельных операций: монтаж ПВО, рекультивация, подготовительные работы.',
          'Следующий шаг: собрать критический путь и план-факт по операциям.'
        ],
        'Автоматизация технологических процессов': [
          'Источник авторазметки: Приложение 7 «Регламент по эксплуатации БИ».',
          'Раздел связан с телеметрией, мониторингом параметров, контролем забойного давления и температуры.',
          'Логически сюда относятся MWD/LWD, цифровой контроль режимов бурения и сигнализация по отклонению параметров.',
          'Следующий шаг: оформить сигналы, роли и правила эскалации.'
        ],
        'Мероприятия по предотвращению осложнений': [
          'Источник авторазметки: Приложение 6 «Указания по снижению рисков МКД» и общее ТЗ.',

      function parseRange(value) {
        const raw = String(value || '').replace(/\*/g, '').replace(/,/g, '.').trim();
        if (!raw) return { min: 0, max: 0 };
        if (raw.includes('-')) {
          const [left, right] = raw.split('-').map((part) => Number(part.trim()));
          return { min: Number.isFinite(left) ? left : 0, max: Number.isFinite(right) ? right : Number.isFinite(left) ? left : 0 };
        }
        const single = Number(raw);
        return { min: Number.isFinite(single) ? single : 0, max: Number.isFinite(single) ? single : 0 };
      }

      function getStageEnvelope(stage) {
        const loads = stage.operations.map((item) => parseRange(item.load));

        const flows = stage.operations.map((item) => parseRange(item.flow));
        const speeds = stage.operations.map((item) => parseRange(item.speed));
        const drillingOps = stage.operations.filter((item) => /бурение/i.test(item.operation) && !/разбуривание|шаблонировка/i.test(item.operation));
        const drillingSpeedRanges = drillingOps.map((item) => parseRange(item.speed));
        const auxiliaryOps = stage.operations.filter((item) => !drillingOps.includes(item));
        const auxiliarySpeedRanges = auxiliaryOps.map((item) => parseRange(item.speed));

        return {
          load: `${formatNumber(Math.min(...loads.map((item) => item.min)), 1)}-${formatNumber(Math.max(...loads.map((item) => item.max)), 1)}`,
          rpm: `${formatNumber(Math.min(...rpms.map((item) => item.min)), 0)}-${formatNumber(Math.max(...rpms.map((item) => item.max)), 0)}`,
          flow: `${formatNumber(Math.min(...flows.map((item) => item.min)), 0)}-${formatNumber(Math.max(...flows.map((item) => item.max)), 0)}`,

            max: Math.max(...drillingSpeedRanges.map((item) => item.max))
          } : { min: 0, max: 0 },

            max: Math.max(...auxiliarySpeedRanges.map((item) => item.max))
          } : { min: 0, max: 0 }

        ['Промежуточная колонна', 'ОКК2-70/178-245×340 К1ХЛ', '1 компл.', '70.0 МПа', '2.55 т'],
        ['Эксплуатационная колонна', 'ОКК2-70/178-245×340 К1ХЛ', '1 компл.', '70.0 МПа', '2.55 т'],
        ['Пилотный ствол / хвостовик', 'ОКК2-70/178-245×340 К1ХЛ', '1 компл.', '70.0 МПа', '2.55 т'],
        ['Эксплуатационная арматура', 'ОП4-280/70(105) К1ХЛ', '1 компл.', '70.0 / 105.0 МПа', '22.3 т']
      ];

      const stageVolumes = stages.map((stage) => ({
        title: stage.title,
        color: stage.color,
        buffer: stage.systems[0]?.volume || 0,
        light: stage.systems[1]?.volume || 0,
        heavy: stage.systems[2]?.volume || 0,
        displacement: stage.systems[3]?.volume || 0
      }));

      const excludedFromCementPriceList = /буровой раствор|пакер|подвеск|муфт|воронк|стингер/i;
      const materialCatalogMap = new Map();
      stages.forEach((stage) => {
        stage.materials.forEach(([name, purpose, unit, qty]) => {
          if (excludedFromCementPriceList.test(name)) {
            return;
          }
          const key = `${normalizeChemicalName(name)}__${unit}`;
          if (!materialCatalogMap.has(key)) {
            materialCatalogMap.set(key, { name: normalizeChemicalName(name), purpose, unit, totalQty: 0 });
          }
          materialCatalogMap.get(key).totalQty += qty;
        });
      });
      const materialCatalog = Array.from(materialCatalogMap.values()).sort((a, b) => a.name.localeCompare(b.name, 'ru'));

      const heroStats = [
        { value: '4', label: 'этапа крепления' },
        { value: '299.88 м³', label: 'суммарный объем жидкостей' },
        { value: '159.7 т', label: 'суммарный цемент' },
        { value: '90.5 МПа', label: 'макс. опрессовка хвостовика' }
      ];
      const heroLegend = stages.map((stage) => ({ color: stage.color, text: `${stage.title} · ${stage.casing}` }));

      document.getElementById('heroStats').hidden = false;
      document.getElementById('heroLegend').hidden = false;
      document.getElementById('heroStats').innerHTML = heroStats.map((item) => `<div class="stat"><strong>${item.value}</strong><span>${item.label}</span></div>`).join('');
      document.getElementById('heroLegend').innerHTML = heroLegend.map((item) => `<span class="chip"><span class="dot-chip" style="background:${item.color}"></span>${item.text}</span>`).join('');

      function getCementPriceKey(name, unit) {
        return `${normalizeChemicalName(name)}__${unit}`;
      }

      function getPricingBasis(unit) {
        if (unit === 'т') return { label: 'руб./т', factor: 1 };
        if (unit === 'кг') return { label: 'руб./т', factor: 1 / 1000 };
        if (unit === 'м³') return { label: 'руб./м³', factor: 1 };
        if (unit === 'л') return { label: 'руб./м³', factor: 1 / 1000 };
        return { label: 'руб./шт', factor: 1 };
      }

      function defaultCementPackaging(name, unit) {
        const lowered = name.toLowerCase();
        if (unit === 'м³' || /раствор|вода/i.test(lowered)) return 'еврокуб';
        if (/цемент|барит|микросфер|гипс/i.test(lowered)) return 'биг-бэг';
        if (unit === 'шт') return 'штучно';
        if (/пакер|подвеска|муфта/i.test(lowered)) return 'штучно';
        return 'мешок';
      }

      function defaultCementPackageAmount(packaging, unit) {
        if (packaging === 'мешок') return unit === 'кг' ? 25 : 0.025;
        if (packaging === 'бочка') return unit === 'л' ? 200 : 0.2;
        if (packaging === 'биг-бэг') return unit === 'кг' ? 1000 : 1;
        if (packaging === 'еврокуб') return unit === 'л' ? 1000 : 1;
        return 1;
      }

      function getDefaultCementPriceCatalog() {
        const catalog = {};
        materialCatalog.forEach((item) => {
          const packaging = defaultCementPackaging(item.name, item.unit);
          catalog[getCementPriceKey(item.name, item.unit)] = {
            packaging,
            packageAmount: defaultCementPackageAmount(packaging, item.unit),
            pricePerBase: ''
          };
        });
        return catalog;
      }

      function getSavedCementPriceCatalog() {
        const fallback = getDefaultCementPriceCatalog();
        const raw = localStorage.getItem(`nexus-cement-price-list-${projectName}-${wellName}`);
        if (!raw) return fallback;
        try {
          return { ...fallback, ...JSON.parse(raw) };
        } catch (error) {
          console.warn('Failed to parse saved cement price list', error);
          return fallback;
        }
      }

      function saveCementPriceCatalog(catalog) {
        localStorage.setItem(`nexus-cement-price-list-${projectName}-${wellName}`, JSON.stringify(catalog));
      }

      function getMaterialCalculations(material, priceCatalog) {
        const [name, purpose, unit, totalQty] = material;
        const key = getCementPriceKey(name, unit);
        const priceRow = priceCatalog[key] || {};
        const { factor, label } = getPricingBasis(unit);
        const packageAmount = Number(priceRow.packageAmount) || 0;
        const pricePerBase = Number(priceRow.pricePerBase) || 0;
        const baseQty = totalQty * factor;
        const packagePrice = packageAmount > 0 ? packageAmount * factor * pricePerBase : 0;
        const pieces = packageAmount > 0 ? Math.ceil(totalQty / packageAmount) : 0;
        const totalCost = baseQty * pricePerBase;
        return { name, purpose, unit, totalQty, baseQty, pieces, packageAmount, pricePerBase, packagePrice, totalCost, priceLabel: label };
      }

      function renderCementVolumeChart() {
        const width = 940;
        const height = 360;
        const margin = { top: 24, right: 24, bottom: 56, left: 80 };
        const plotWidth = width - margin.left - margin.right;
        const plotHeight = height - margin.top - margin.bottom;
        const maxValue = Math.max(...stageVolumes.map((item) => item.buffer + item.light + item.heavy + item.displacement));
        const bandWidth = plotWidth / stageVolumes.length - 24;
        const scaleY = (value) => margin.top + plotHeight - (value / maxValue) * plotHeight;
        const grid = Array.from({ length: 6 }, (_, index) => {
          const value = (maxValue / 5) * index;
          const y = margin.top + plotHeight - (plotHeight / 5) * index;
          return `<line x1="${margin.left}" y1="${y}" x2="${width - margin.right}" y2="${y}" stroke="rgba(226,237,255,0.08)" /><text x="${margin.left - 12}" y="${y + 4}" font-size="11" fill="#a8bdd2" text-anchor="end">${formatNumber(value, 0)}</text>`;
        }).join('');
        const bars = stageVolumes.map((item, index) => {
          const x = margin.left + index * (plotWidth / stageVolumes.length) + 12;
          const parts = [
            { value: item.displacement, color: 'rgba(255,255,255,.18)' },
            { value: item.heavy, color: '#ffbf66' },
            { value: item.light, color: '#20d9b4' },
            { value: item.buffer, color: item.color }
          ];
          let bottom = height - margin.bottom;
          const segments = parts.map((part) => {
            const h = (part.value / maxValue) * plotHeight;
            bottom -= h;
            return `<rect x="${x}" y="${bottom}" width="${bandWidth}" height="${h}" rx="8" fill="${part.color}" />`;
          }).join('');
          const total = item.buffer + item.light + item.heavy + item.displacement;
          return `${segments}<text x="${x + bandWidth / 2}" y="${scaleY(total) - 8}" font-size="11" fill="#ecf4ff" text-anchor="middle">${formatNumber(total, 2)}</text><text x="${x + bandWidth / 2}" y="${height - margin.bottom + 18}" font-size="11" fill="#bfd3e8" text-anchor="middle">${item.title}</text>`;
        }).join('');
        return createSvg(width, height, `${grid}<line x1="${margin.left}" y1="${height - margin.bottom}" x2="${width - margin.right}" y2="${height - margin.bottom}" stroke="#8db4ff" stroke-width="1.5" />${bars}`);
      }

      function renderCementingSchematic() {
        const width = 900;
        const height = 430;
        const maxDepth = 3650;
        const scaleY = (depth) => 28 + (depth / maxDepth) * 338;
        const xPositions = [130, 320, 510, 700];
        const columns = stages.map((stage, index) => {
          const topY = stage.title === 'Хвостовик' ? scaleY(3534) : 28;
          const shoeY = scaleY(stage.shoeDepth);
          const cementTopDepth = stage.title === 'Хвостовик' ? 3644.7 : stage.title === 'Эксплуатационная колонна' ? 0 : stage.title === 'Промежуточная колонна' ? 0 : 300;
          const cementTopY = stage.title === 'Хвостовик' ? shoeY : scaleY(cementTopDepth);
          const x = xPositions[index];
          const casingWidth = 26 - index * 2;
          const cementWidth = casingWidth + 18;
          return `
            <g>
              ${stage.title !== 'Хвостовик' ? `<rect x="${x - cementWidth / 2}" y="${cementTopY}" width="${cementWidth}" height="${shoeY - cementTopY}" fill="${stage.color}" opacity="0.16" />` : ''}
              <rect x="${x - casingWidth / 2}" y="${topY}" width="${casingWidth}" height="${shoeY - topY}" fill="none" stroke="${stage.color}" stroke-width="6" />
              <path d="M ${x - casingWidth / 2} ${shoeY} L ${x - casingWidth / 2 - 12} ${shoeY + 14} L ${x - casingWidth / 2} ${shoeY + 14} Z" fill="${stage.color}" />
              <path d="M ${x + casingWidth / 2} ${shoeY} L ${x + casingWidth / 2 + 12} ${shoeY + 14} L ${x + casingWidth / 2} ${shoeY + 14} Z" fill="${stage.color}" />
              <text x="${x}" y="18" text-anchor="middle" font-size="12" fill="#ecf4ff">${stage.title}</text>
              <text x="${x + 40}" y="${shoeY + 4}" font-size="11" fill="#bfd3e8">${formatNumber(stage.shoeDepth, 1)} м</text>
            </g>`;
        }).join('');
        const marks = [0, 300, 1000, 2200, 3549.6].map((depth) => `<line x1="38" y1="${scaleY(depth)}" x2="840" y2="${scaleY(depth)}" stroke="rgba(255,255,255,.06)" /><text x="26" y="${scaleY(depth) + 4}" text-anchor="end" font-size="11" fill="#bfd3e8">${formatNumber(depth, depth % 1 ? 1 : 0)}</text>`).join('');
        return createSvg(width, height, `${marks}${columns}<text x="30" y="22" text-anchor="end" font-size="11" fill="#a8bdd2">м</text>`);
      }

      function renderPressureLineChart(stage) {
        const width = 820;
        const height = 320;
        const margin = { top: 20, right: 24, bottom: 42, left: 72 };
        const maxPressure = Math.max(...stage.pressureProfile.flatMap((point) => [point.outer, point.inner, point.collapseLimit, point.burstLimit]));
        const maxDepth = Math.max(...stage.pressureProfile.map((point) => point.depth));
        const scaleX = (value) => margin.left + (value / maxPressure) * (width - margin.left - margin.right);
        const scaleY = (value) => margin.top + (value / maxDepth) * (height - margin.top - margin.bottom);
        const grid = Array.from({ length: 6 }, (_, index) => {
          const pressure = (maxPressure / 5) * index;
          const x = scaleX(pressure);
          return `<line x1="${x}" y1="${margin.top}" x2="${x}" y2="${height - margin.bottom}" stroke="rgba(226,237,255,0.08)" /><text x="${x}" y="${height - 10}" font-size="11" fill="#a8bdd2" text-anchor="middle">${formatNumber(pressure, 1)}</text>`;
        }).join('');
        const makePath = (key) => stage.pressureProfile.map((point, index) => `${index === 0 ? 'M' : 'L'} ${scaleX(point[key])} ${scaleY(point.depth)}`).join(' ');
        return createSvg(width, height, `${grid}<line x1="${margin.left}" y1="${margin.top}" x2="${margin.left}" y2="${height - margin.bottom}" stroke="#8db4ff" stroke-width="1.2" /><line x1="${margin.left}" y1="${height - margin.bottom}" x2="${width - margin.right}" y2="${height - margin.bottom}" stroke="#8db4ff" stroke-width="1.2" /><path d="${makePath('outer')}" fill="none" stroke="#7fd16d" stroke-width="3" /><path d="${makePath('inner')}" fill="none" stroke="#ff5d5d" stroke-width="3" /><path d="${makePath('collapseLimit')}" fill="none" stroke="#79d3ff" stroke-width="2" stroke-dasharray="8 6" /><path d="${makePath('burstLimit')}" fill="none" stroke="#ffbf66" stroke-width="2" stroke-dasharray="8 6" />`);
      }

      const cementPriceCatalog = getSavedCementPriceCatalog();
      const specialContent = document.getElementById('specialContent');
      specialContent.innerHTML = `
        <section class="panel">
          <div class="program-launch">
            <a class="program-launch-btn" href="${buildCementProgramLink(projectName, wellName)}" target="_blank" rel="noopener">Сформировать программу по цементированию скважины</a>
            <p>Кнопка открывает отдельную страницу с черновиком программы цементирования для скважины ${wellName}: архитектура крепления, интервалы цементирования, объемы, рецептуры тампонажных систем и материалы по колоннам.</p>
          </div>
        </section>

        <section class="panel">
          <div class="section-head"><h2>Архитектура крепления</h2><span>таблицы 7.1-7.3</span></div>
          <div class="grid-4">
            <div class="metric"><div class="k">Цементируемые колонны</div><div class="v">Кондуктор, промежуточная и эксплуатационная колонны поднимаются до устья.</div></div>
            <div class="metric"><div class="k">Хвостовик</div><div class="v">Не цементируется, крепление обеспечивается подвеской, пакером и испытанием на герметичность.</div></div>
            <div class="metric"><div class="k">Опрессовка</div><div class="v">От 7.5 МПа на кондукторе до 90.5 МПа на хвостовике.</div></div>
            <div class="metric"><div class="k">Материалы</div><div class="v">ПЦТ-I-50 и ПЦТ-I-G-CC1, облегченные системы, буферы, продавочные жидкости и добавки.</div></div>
          </div>
          <div class="note">Раздел построен вокруг интервального подхода: для каждой колонны показаны объемы буфера, облегченного и цементного раствора, продавка, рецептура, контрольные параметры и коммерческий слой по материалам.</div>
        </section>

        <section class="panel">
          <div class="section-head"><h2>Схема цементирования и объемы</h2><span>графика по колоннам</span></div>
          <div class="grid-2">
            <div class="schematic-box"><h3>Интервалы крепления</h3>${renderCementingSchematic()}<div class="caption">Цветная заливка показывает зону цементирования. Для хвостовика вместо цемента показан отдельный интервал подвески и герметизации.</div></div>
            <div class="schematic-box"><h3>Структура объемов по колоннам</h3><div class="chart-shell">${renderCementVolumeChart()}</div><div class="caption">Стек показывает буфер, облегченный цементный раствор, хвостовую цементную порцию и продавочную жидкость. Это позволяет сразу сравнить материальную нагрузку по интервалам.</div></div>
          </div>
        </section>

        <section class="panel">
          <div class="section-head"><h2>Колонны и прочность</h2><span>таблицы 7.1-7.6</span></div>
          <div class="grid-2">
            <div class="table-box">
              <h3>Параметры обсадных колонн</h3>
              <div class="table-wrap"><table><thead><tr><th>Колонна</th><th>Ø, мм</th><th>Марка</th><th>Стенка</th><th>Длина, м</th><th>Масса секции, т</th><th>Смятие</th><th>Внутр. давление</th><th>Растяжение резьбы</th><th>Растяжение трубы</th><th>Спуск с учетом изгиба</th><th>Масса труб, т</th><th>Запас, %</th></tr></thead><tbody>${casingParameters.map((row) => `<tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td><td>${row[5]}</td><td>${row[6]}</td><td>${row[7]}</td><td>${row[8]}</td><td>${row[9]}</td><td>${row[10]}</td><td>${row[11]}</td><td class="good">${row[12]}</td></tr>`).join('')}</tbody></table></div>
            </div>
            <div class="table-box">
              <h3>Устьевое оборудование</h3>
              <div class="table-wrap"><table><thead><tr><th>Этап</th><th>Оборудование</th><th>Количество</th><th>Рабочее давление</th><th>Масса</th></tr></thead><tbody>${wellheadEquipment.map((row) => `<tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td></tr>`).join('')}</tbody></table></div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="section-head"><h2>Интервалы цементирования</h2><span>рецептуры, параметры, материалы</span></div>
          <div class="tabs" id="cementTabs"></div>
          <div id="cementPanes"></div>
        </section>

        <section class="panel">
          <div class="section-head"><h2>Прайс-лист материалов цементирования</h2><span>сохранение и пересчет стоимости</span></div>
          <div class="note">Для каждого материала укажи упаковку, базовую цену и упаковочную норму. Для твердых материалов используется цена за тонну, для жидкостей - за м³, для штучной оснастки - за штуку.</div>
          <div class="table-wrap"><table><thead><tr><th>Наименование</th><th>Назначение</th><th>Суммарная потребность</th><th>Упаковка</th><th>Вес / объем упаковки</th><th>Цена за базовую ед.</th><th>Цена за упаковку</th><th>Стоимость на скважину</th></tr></thead><tbody id="cementPriceListBody"></tbody></table></div>
          <div class="actions"><button class="btn btn-cyan" id="saveCementPriceListButton">Сохранить</button></div>
        </section>
      `;

      const cementTabs = document.getElementById('cementTabs');
      const cementPanes = document.getElementById('cementPanes');
      cementTabs.innerHTML = stages.map((stage, index) => `<button class="tab-btn ${stage.key} ${index === 0 ? 'active' : ''}" data-target="${stage.id}">${stage.title}<br><small>${stage.casing}</small></button>`).join('');

      function renderCementPanes() {
        const currentActive = cementPanes.querySelector('.tab-pane.active')?.id;
        cementPanes.innerHTML = stages.map((stage, index) => {
          const materials = stage.materials.map((item) => getMaterialCalculations(item, cementPriceCatalog));
          const totalCost = materials.reduce((sum, item) => sum + item.totalCost, 0);
          const active = currentActive ? stage.id === currentActive : index === 0;
          return `
            <div class="tab-pane ${active ? 'active' : ''}" id="${stage.id}">
              <div class="stripe" style="background:color-mix(in srgb, ${stage.color} 10%, transparent);border:1px solid color-mix(in srgb, ${stage.color} 30%, transparent)">
                <div>
                  <div class="name" style="color:${stage.color}">${stage.title}</div>
                  <div class="system">${stage.overview}</div>
                </div>
                <div class="meta-row">
                  <span class="pill">📏 ${stage.range}</span>
                  <span class="pill">🧱 ${stage.cementTop}</span>
                  <span class="pill">🧪 опрессовка ${stage.testPressure}</span>
                  <span class="pill">🔩 ${stage.casing}</span>
                </div>
              </div>

              <div class="grid-2">
                <div class="table-box">
                  <h3>Объемы, заполнение и контроль</h3>
                  <div class="vol-grid">
                    <div class="vol-card"><div class="lbl">Башмак</div><div class="val" style="color:${stage.color}">${formatNumber(stage.shoeDepth, 1)} м</div></div>
                    <div class="vol-card"><div class="lbl">Подъем цемента</div><div class="val">${stage.cementTop}</div></div>
                    <div class="vol-card"><div class="lbl">Опрессовка</div><div class="val">${stage.testPressure}</div></div>
                    <div class="vol-card"><div class="lbl">Заполнение по вертикали</div><div class="val">${stage.fillVertical}</div></div>
                    <div class="vol-card"><div class="lbl">Заполнение по стволу</div><div class="val">${stage.fillHole}</div></div>
                    <div class="vol-card"><div class="lbl">Запас по прочности</div><div class="val good">${stage.safetyReserve}</div></div>
                  </div>
                  <div class="note">${stage.title === 'Хвостовик' ? 'Для хвостовика акцент смещен с цементирования на подвеску, изоляцию и испытание на герметичность.' : 'Объемы и режимы соответствуют гидравлической программе цементирования и таблицам заполнения затрубного пространства.'}</div>
                </div>
                <div class="table-box">
                  <h3>Эпюра избыточных давлений</h3>
                  <div class="chart-shell">${renderPressureLineChart(stage)}</div>
                  <div class="caption">Зеленая линия - наружные давления, красная - внутренние при опрессовке, голубая и оранжевая - предельные линии по смятию и внутреннему давлению.</div>
                </div>
              </div>

              <div class="system-grid" style="margin-top:14px">${stage.systems.map((system) => `
                <div class="system-card">
                  <h4>${system.name}</h4>
                  <div class="system-meta">
                    <span class="system-pill">${system.volume ? `${formatNumber(system.volume, 2)} м³` : 'без объема'}</span>
                    <span class="system-pill">${system.density ? `${formatNumber(system.density, 0)} кг/м³` : 'без плотности'}</span>
                    <span class="system-pill">${system.pumpRate}</span>
                  </div>
                  <p>${system.role}</p>
                  <div class="table-wrap" style="margin-top:10px"><table><thead><tr><th>Показатель</th><th>Значение</th></tr></thead><tbody>
                    <tr><td>Реология</td><td>${system.rheology}</td></tr>
                    <tr><td>Время загустевания</td><td>${system.thickening}</td></tr>
                    <tr><td>Прочность на сжатие</td><td>${system.strength}</td></tr>
                    <tr><td>Состав / рецептура</td><td>${system.components}</td></tr>
                  </tbody></table></div>
                </div>
              `).join('')}</div>

              <div class="grid-2" style="margin-top:14px">

        const packaging = row.querySelector('[data-role="packaging"]').value;
        const totalQty = Number(row.dataset.totalQty || 0);
        const name = row.dataset.name;
        const unit = row.dataset.unit;
        const { factor } = getPricingBasis(unit);
        const unitTarget = row.querySelector('[data-role="price-per-package"]');
        const totalTarget = row.querySelector('[data-role="well-total"]');
        const key = getCementPriceKey(name, unit);

          totalTarget.textContent = '—';
          renderCementPanes();
          return;
        }
        unitTarget.textContent = `${formatMoney(amount * factor * pricePerBase)} руб.`;

        return `${normalizeChemicalName(name)}__${unit}`;

        const catalog = {};

            packageWeight: defaultPackageWeight(packaging),

          const parsed = JSON.parse(raw);

        const [name, purpose, unit, baseNormPerM3] = reagent;
        const normPerM3 = Number.isFinite(normOverride) ? normOverride : Number(baseNormPerM3) || 0;
        const totalQty = normPerM3 * stageTotalPrepared;
        const key = getPriceSettingsKey(name, unit);
        const priceRow = priceCatalog[key] || {};
        const packageWeight = Number(priceRow.packageWeight) || 0;
        const pricePerTon = Number(priceRow.pricePerTon) || 0;
        const qtyInTons = totalQty / 1000;
        const pieces = packageWeight > 0 ? Math.ceil(totalQty / packageWeight) : 0;
        const pricePerKg = pricePerTon > 0 ? pricePerTon / 1000 : 0;
        const costPerM3 = pricePerTon > 0 ? normPerM3 * (pricePerTon / 1000) : 0;
        const totalCost = pricePerTon > 0 ? qtyInTons * pricePerTon : 0;

        return {
          name,
          purpose,
          unit,
          normPerM3,
          totalQty,
          qtyInTons,
          pieces,
          costPerM3,
          totalCost,
          packageWeight,
          pricePerTon,
          stageTotalPrepared
        };

        const width = 940;
        const height = 360;
        const margin = { top: 24, right: 24, bottom: 56, left: 80 };
        const plotWidth = width - margin.left - margin.right;
        const plotHeight = height - margin.top - margin.bottom;
        const maxDensity = 1800;
        const scaleX = (index) => margin.left + (plotWidth / intervals.length) * index;
        const scaleY = (value) => margin.top + plotHeight - ((value - 1000) / (maxDensity - 1000)) * plotHeight;

        const grid = Array.from({ length: 6 }, (_, index) => {
          const value = 1000 + ((maxDensity - 1000) / 5) * index;
          const y = scaleY(value);
          return `<line x1="${margin.left}" y1="${y}" x2="${width - margin.right}" y2="${y}" stroke="rgba(226,237,255,0.08)" />

        }).join('');

        const bars = intervals.map((item, index) => {
          const x = scaleX(index) + 12;
          const barWidth = (plotWidth / intervals.length) - 24;
          const y = scaleY(item.density);
          const h = margin.top + plotHeight - y;
          return `<rect x="${x}" y="${y}" width="${barWidth}" height="${h}" rx="10" fill="${item.color}" opacity="0.9" />

            <text x="${x + barWidth / 2}" y="${height - margin.bottom + 18}" font-size="11" fill="#bfd3e8" text-anchor="middle">${item.label}</text>`;
        }).join('');

          ${grid}
          <line x1="${margin.left}" y1="${height - margin.bottom}" x2="${width - margin.right}" y2="${height - margin.bottom}" stroke="#8db4ff" stroke-width="1.5" />
          ${bars}
          <text x="${width / 2}" y="${height - 10}" font-size="12" fill="#bfd3e8" text-anchor="middle">Интервалы бурения</text>
          <text x="18" y="${height / 2}" font-size="12" fill="#bfd3e8" text-anchor="middle" transform="rotate(-90 18 ${height / 2})">Плотность, кг/м³</text>
        `);
      }

      const maxComponent = Math.max(...topComponents.map((item) => item[1]));
      document.getElementById('componentBars').innerHTML = topComponents.map((item) => `
        <div class="bar-row">
          <div class="bar-label">${item[0]}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(item[1] / maxComponent) * 100}%"></div></div>
          <div class="bar-val">${formatNumber(item[1], 0)}</div>
        </div>
      `).join('');

      function rerenderMudTables() {
        const currentActive = mudPanes.querySelector('.tab-pane.active')?.id;
        mudPanes.innerHTML = stages.map((stage, index) => {
          const reagentRows = stage.reagents.map((row, rowIndex) => getReagentCalculations(
            row,
            priceCatalog,
            stage.totalPrepared,
            getStoredNorm(stage.id, rowIndex, Number(row[3]) || 0)
          ));
          const totalStageCost = reagentRows.reduce((sum, row) => sum + row.totalCost, 0);
          const active = currentActive ? stage.id === currentActive : index === 0;
          return `
            <div class="tab-pane ${active ? 'active' : ''}" id="${stage.id}">
              <div class="stripe" style="background:color-mix(in srgb, ${stage.color} 10%, transparent);border:1px solid color-mix(in srgb, ${stage.color} 30%, transparent)">
                <div>
                  <div class="name" style="color:${stage.color}">${stage.title}</div>
                  <div class="system">${stage.system}</div>
                </div>
                <div class="meta-row">
                  <span class="pill">📏 ${stage.range}</span>
                  <span class="pill">📌 ${stage.altRange}</span>
                  <span class="pill">⚙ ${stage.bit}</span>
                  <span class="pill">🔩 ${stage.casing}</span>
                  <span class="pill">💧 ${stage.density} кг/м³</span>
                </div>
              </div>

              <div class="grid-2">
                <div class="table-box">
                  <h3>Объемы и рабочая логика</h3>
                  <div class="vol-grid">
                    <div class="vol-card"><div class="lbl">Подготовить всего</div><div class="val" style="color:${stage.color}">${formatNumber(stage.totalPrepared, 0)} м³</div></div>
                    <div class="vol-card"><div class="lbl">Объем в конце интервала</div><div class="val">${formatNumber(stage.workingVolume, 2)} м³</div></div>
                    <div class="vol-card"><div class="lbl">Открытый ствол</div><div class="val">${formatNumber(stage.openHole, 2)} м³</div></div>
                    <div class="vol-card"><div class="lbl">Окончательный объем БР</div><div class="val">${formatNumber(stage.finalVolume, 2)} м³</div></div>
                    <div class="vol-card"><div class="lbl">Переведено с прошлого интервала</div><div class="val ${stage.carryOver ? 'good' : ''}">${formatNumber(stage.carryOver, 0)} м³</div></div>
                    <div class="vol-card"><div class="lbl">Вероятные потери</div><div class="val bad">${formatNumber(stage.losses, 0)} м³</div></div>
                  </div>
                  <div class="note">${stage.notes} Потери: ${stage.lossesBreakdown}.</div>
                  ${stage.bands ? `<div class="table-wrap" style="margin-top:12px"><table><thead><tr><th>Подинтервал</th><th>Плотность</th><th>YP</th><th>УВ/В</th><th>Электростабильность</th></tr></thead><tbody>${stage.bands.map((band) => `<tr><td>${band.label} · ${band.interval}</td><td>${band.density}</td><td>${band.rheology}</td><td>${band.emulsion}</td><td>${band.stability}</td></tr>`).join('')}</tbody></table></div>` : ''}
                </div>
                <div class="table-box">
                  <h3>Параметры бурового раствора</h3>
                  <div class="table-wrap"><table><thead><tr><th>Параметр</th><th>Значение</th></tr></thead><tbody>${stage.params.map((row) => `<tr><td>${row[0]}</td><td>${row[1]}</td></tr>`).join('')}</tbody></table></div>
                </div>
              </div>
              <div class="table-box" style="margin-top:14px">
                <h3>Химреагенты и норма на интервал</h3>
                <div class="table-wrap"><table><thead><tr><th>Компонент</th><th>Назначение</th><th>Ед.</th><th>Норма на 1 м³</th><th>Потребность, т</th><th>Потребность, шт</th><th>Стоимость на 1 м³</th><th>Общая стоимость реагента</th></tr></thead><tbody>${reagentRows.map((row, rowIndex) => `<tr><td>${row.name}</td><td>${row.purpose}</td><td class="u">${row.unit}</td><td><input class="norm-input" type="number" min="0" step="0.001" inputmode="decimal" data-stage-id="${stage.id}" data-reagent-index="${rowIndex}" data-default-norm="${Number(stage.reagents[rowIndex][3]) || 0}" value="${formatEditableNumber(row.normPerM3)}" /></td><td class="good">${formatNumber(row.qtyInTons, 3)}</td><td>${row.packageWeight ? formatNumber(row.pieces, 0) : '—'}</td><td>${row.pricePerTon ? `${formatMoney(row.costPerM3)} руб.` : '—'}</td><td class="price-total">${row.pricePerTon ? `${formatMoney(row.totalCost)} руб.` : '—'}</td></tr>`).join('')}<tr><td colspan="7" style="text-align:right;font-weight:800">Общая стоимость всех реагентов</td><td class="price-total">${totalStageCost ? `${formatMoney(totalStageCost)} руб.` : '—'}</td></tr></tbody></table></div>
                <div class="interval-recommendation-box">
                  <h3>Рекомендации по бурению интервала</h3>
                  <textarea class="interval-recommendation-input" data-stage-recommendation="${stage.id}" placeholder="Внеси рекомендации для этого интервала...">${escapeHtml(savedRecommendations[stage.id] || '')}</textarea>
                </div>
              </div>
            </div>
          `;
        }).join('');

        mudTabs.querySelectorAll('.tab-btn').forEach((button) => {
          button.addEventListener('click', () => {
            const target = button.dataset.target;
            mudTabs.querySelectorAll('.tab-btn').forEach((btn) => btn.classList.remove('active'));
            mudPanes.querySelectorAll('.tab-pane').forEach((pane) => pane.classList.remove('active'));
            button.classList.add('active');
            document.getElementById(target).classList.add('active');
          });
        });

        mudPanes.querySelectorAll('[data-stage-id][data-reagent-index]').forEach((field) => {
          field.addEventListener('change', () => {
            const stageId = field.dataset.stageId;
            const reagentIndex = Number(field.dataset.reagentIndex);
            const defaultNorm = Number(field.dataset.defaultNorm) || 0;
            const key = getNormKey(stageId, reagentIndex);
            const rawValue = field.value.trim();

            if (!rawValue) {
              delete savedNorms[key];
              saveNorms(savedNorms);
              rerenderMudTables();
              return;
            }

            const value = Number(rawValue);
            if (!Number.isFinite(value) || value < 0) {
              field.value = formatEditableNumber(getStoredNorm(stageId, reagentIndex, defaultNorm));
              return;
            }

            if (Math.abs(value - defaultNorm) < 0.000001) {
              delete savedNorms[key];
            } else {
              savedNorms[key] = value;
            }
            saveNorms(savedNorms);
            rerenderMudTables();
          });
        });

        mudPanes.querySelectorAll('[data-stage-recommendation]').forEach((field) => {
          field.addEventListener('input', () => {
            savedRecommendations[field.dataset.stageRecommendation] = field.value;
            saveRecommendations(savedRecommendations);
          });
        });
      }

      function updatePriceRow(row) {
        const weight = Number(row.querySelector('[data-role="package-weight"]').value);
        const pricePerTon = Number(row.querySelector('[data-role="price-per-ton"]').value);
        const target = row.querySelector('[data-role="price-per-unit"]');
        const totalTarget = row.querySelector('[data-role="well-total"]');
        const totalQty = Number(row.dataset.totalQty || 0);
        const name = row.dataset.name;
        const unit = row.dataset.unit;
        const packaging = row.querySelector('[data-role="packaging"]').value;
        const key = getPriceSettingsKey(name, unit);
        priceCatalog[key] = { packaging, packageWeight: weight || '', pricePerTon: pricePerTon || '' };
        if (!weight || !pricePerTon) {
          target.textContent = '—';
          totalTarget.textContent = '—';
          rerenderMudTables();
          return;
        }
        const unitPrice = (weight / 1000) * pricePerTon;
        const wellTotal = totalQty * (pricePerTon / 1000);
        target.textContent = `${formatMoney(unitPrice)} руб.`;
        totalTarget.textContent = `${formatMoney(wellTotal)} руб.`;
        rerenderMudTables();
      }

      document.getElementById('priceListBody').innerHTML = chemicalCatalog.map((item, index) => {
        const packaging = defaultPackaging(item.name, item.unit);
        const packageWeight = defaultPackageWeight(packaging);
        return `
          <tr data-total-qty="${item.totalQty}" data-name="${item.name}" data-unit="${item.unit}">
            <td><strong>${item.name}</strong></td>
            <td>${Array.from(item.purposes).join(', ')}</td>
            <td><span class="good">${formatNumber(item.totalQty, 0)}</span> <span class="u">${item.unit}</span></td>
            <td>
              <select class="price-select" data-row-id="${index}" data-role="packaging">
                <option value="мешок" ${priceCatalog[getPriceSettingsKey(item.name, item.unit)]?.packaging === 'мешок' || packaging === 'мешок' ? 'selected' : ''}>мешок</option>
                <option value="бочка" ${priceCatalog[getPriceSettingsKey(item.name, item.unit)]?.packaging === 'бочка' || packaging === 'бочка' ? 'selected' : ''}>бочка</option>
                <option value="биг-бэг" ${priceCatalog[getPriceSettingsKey(item.name, item.unit)]?.packaging === 'биг-бэг' || packaging === 'биг-бэг' ? 'selected' : ''}>биг-бэг</option>
              </select>
            </td>
            <td><input class="price-input" data-row-id="${index}" data-role="package-weight" type="number" min="0" step="0.1" value="${priceCatalog[getPriceSettingsKey(item.name, item.unit)]?.packageWeight || packageWeight}" /></td>
            <td><input class="price-input" data-row-id="${index}" data-role="price-per-ton" type="number" min="0" step="0.01" placeholder="руб./т" value="${priceCatalog[getPriceSettingsKey(item.name, item.unit)]?.pricePerTon || ''}" /></td>
            <td class="price-unit" data-role="price-per-unit">—</td>
            <td class="price-total" data-role="well-total">—</td>
          </tr>
        `;
      }).join('');

      document.querySelectorAll('#priceListBody tr').forEach((row) => {
        const packagingSelect = row.querySelector('[data-role="packaging"]');
        const weightInput = row.querySelector('[data-role="package-weight"]');
        const tonInput = row.querySelector('[data-role="price-per-ton"]');

        packagingSelect.addEventListener('change', () => {
          const current = packagingSelect.value;
          if (!weightInput.dataset.touched) {
            weightInput.value = defaultPackageWeight(current);
          }
          updatePriceRow(row);
        });

        weightInput.addEventListener('input', () => {
          weightInput.dataset.touched = 'true';
          updatePriceRow(row);
        });

        tonInput.addEventListener('input', () => updatePriceRow(row));
        updatePriceRow(row);
      });

      const savePriceListKey = `nexus-price-list-${projectName}-${wellName}`;
      const savePriceListButton = document.getElementById('savePriceListButton');

      savePriceListButton.addEventListener('click', () => {
        savePriceCatalog(priceCatalog);
        savePriceListButton.textContent = 'Сохранено';
        setTimeout(() => {
          savePriceListButton.textContent = 'Сохранить';
        }, 1400);
      });

      rerenderMudTables();
    }

    if (sectionTitle === 'Буровые растворы') {
      renderMudSection();
    } else if (sectionTitle === 'Крепление скважины') {
      renderCementingSection();
    } else if (sectionTitle === 'Углубление скважины') {
      renderAdvanceSection();
    } else {
      renderGenericSection();
    }
  </script>
  <script src="assets/js/global-auth-widget.js"></script>
</body>
</html>
